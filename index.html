<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — Los Rios career & education navigator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@500;700&family=Noto+Sans+Arabic:wght@400;600&display=swap');

:root{
  --bg-0:#0A0E27;
  --bg-1:#12183D;
  --panel:rgba(255,255,255,0.045);
  --panel-solid:#161C45;
  --border:rgba(255,255,255,0.09);
  --border-strong:rgba(255,255,255,0.18);
  --coral:#FF6B5B;
  --coral-bright:#FF8B7A;
  --teal:#2DD9C6;
  --gold:#FFB648;
  --violet:#8B7FFF;
  --text:#F1F3FA;
  --text-dim:#9AA3C7;
  --text-faint:#6A7299;
  --paper:#F7F4EC;
  --paper-text:#1C2340;
  --ok:#2DD9A0;
  --warn:#FFB648;
  --danger:#FF6B5B;
  --r-sm:10px;--r-md:16px;--r-lg:22px;
}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg-0);color:var(--text);font-family:'Inter',sans-serif;}
body{
  background:
    radial-gradient(circle at 15% 8%, rgba(139,127,255,0.16), transparent 40%),
    radial-gradient(circle at 85% 15%, rgba(45,217,198,0.12), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(255,107,91,0.10), transparent 50%),
    var(--bg-0);
  min-height:100vh;
}
[dir="rtl"] body{font-family:'Noto Sans Arabic','Inter',sans-serif;}
[dir="rtl"] .disp{font-family:'Noto Naskh Arabic','Fraunces',serif;}

#app{min-height:100vh;position:relative;}
.disp{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}

header{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding:16px 28px;border-bottom:1px solid var(--border);
  background:rgba(10,14,39,0.78);backdrop-filter:blur(16px);
}
.brand{display:flex;align-items:center;gap:12px;}
.brand svg{width:36px;height:36px;flex:none;}
.brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-0.01em;}
.brand p{margin:0;font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;}

.top-controls{display:flex;gap:10px;align-items:center;}
select#langSel{
  background:var(--panel-solid);border:1px solid var(--border-strong);color:var(--text);
  font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:999px;cursor:pointer;
  appearance:none;-webkit-appearance:none;
}

nav{display:flex;gap:3px;flex-wrap:wrap;}
nav button{
  font-size:12.5px;font-weight:600;background:transparent;border:1px solid transparent;
  color:var(--text-dim);padding:9px 15px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap;
}
nav button:hover{color:var(--text);background:var(--panel);}
nav button.active{color:#0A0E27;background:linear-gradient(135deg,var(--coral),var(--gold));font-weight:700;}
nav button:disabled{opacity:.3;cursor:not-allowed;}

main{position:relative;max-width:960px;margin:0 auto;padding:36px 24px 110px;}

.disclaimer{
  display:flex;gap:10px;align-items:flex-start;background:rgba(255,182,72,0.08);
  border:1px solid rgba(255,182,72,0.3);padding:13px 16px;border-radius:var(--r-sm);
  font-size:12px;color:#F3D9A6;line-height:1.55;margin-bottom:26px;
}
.disclaimer b{color:var(--gold);}

.ccn-alert{
  background:linear-gradient(135deg, rgba(255,107,91,0.12), rgba(139,127,255,0.10));
  border:1px solid rgba(255,107,91,0.32);border-radius:var(--r-md);padding:18px 20px;margin-bottom:26px;
}
.ccn-alert .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  background:var(--coral);color:#0A0E27;padding:3px 10px;border-radius:999px;margin-bottom:10px;}
.ccn-alert p{margin:0;font-size:13px;line-height:1.6;color:var(--text-dim);}
.ccn-alert b{color:var(--text);}

.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--teal);margin-bottom:10px;font-weight:600;}
h2.title{font-family:'Fraunces',serif;font-size:clamp(26px,4vw,38px);font-weight:700;line-height:1.14;margin:0 0 16px;
  background:linear-gradient(135deg, var(--text) 40%, var(--coral-bright));-webkit-background-clip:text;background-clip:text;}
[dir="rtl"] h2.title{font-family:'Noto Naskh Arabic','Fraunces',serif;background:none;-webkit-text-fill-color:var(--text);color:var(--text);}
.lede{font-size:15px;color:var(--text-dim);max-width:600px;line-height:1.65;margin-bottom:30px;}

.btn-primary{
  font-weight:800;font-size:14.5px;color:#0A0E27;border:none;padding:15px 28px;border-radius:999px;cursor:pointer;
  background:linear-gradient(135deg,var(--coral),var(--gold));box-shadow:0 8px 24px rgba(255,107,91,0.28);
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(255,107,91,0.4);}
.btn-ghost{
  font-weight:700;font-size:13px;color:var(--text);background:var(--panel);border:1px solid var(--border-strong);
  padding:10px 18px;border-radius:999px;cursor:pointer;
}
.btn-ghost:hover{background:rgba(255,255,255,0.08);}

.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px;}

/* dashboard */
.dash-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:28px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-md);padding:20px 22px;}
.stat-card .num{font-family:'Fraunces',serif;font-size:32px;font-weight:700;margin:2px 0 4px;color:var(--teal);}
.stat-card .lbl{font-size:11.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;}
.progress-bar{height:8px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:10px;}
.progress-bar .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),var(--coral));}

.dim-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border);margin-top:8px;}
.dim-preview div{background:var(--panel-solid);padding:14px 12px;font-size:11px;color:var(--text-faint);}
.dim-preview div b{display:block;color:var(--text);font-size:10.5px;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}

/* test */
.test-wrap{max-width:660px;}
.back-link{background:none;border:none;color:var(--text-faint);font-size:12.5px;cursor:pointer;margin-bottom:16px;padding:0;}
.back-link:hover{color:var(--coral-bright);}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);margin-bottom:8px;}
.progress-track{height:4px;background:rgba(255,255,255,0.08);border-radius:99px;margin-bottom:32px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--coral));border-radius:99px;transition:width .25s;}

.question-card{background:linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid var(--border-strong);
  padding:38px 34px;border-radius:var(--r-lg);}
.q-dim-tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--bg-0);text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:16px;background:var(--teal);padding:4px 11px;border-radius:999px;font-weight:700;}
.q-text{font-family:'Fraunces',serif;font-size:23px;line-height:1.42;margin:0 0 30px;font-weight:600;}
[dir="rtl"] .q-text{font-family:'Noto Naskh Arabic','Fraunces',serif;font-size:21px;}
.scale-row{display:flex;gap:8px;flex-wrap:wrap;}
.scale-btn{
  flex:1;min-width:90px;padding:15px 8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text-dim);
  font-size:11px;text-align:center;cursor:pointer;border-radius:var(--r-sm);transition:.13s;line-height:1.3;
}
.scale-btn:hover{border-color:var(--coral);color:var(--text);background:rgba(255,107,91,0.08);transform:translateY(-2px);}
.scale-num{display:block;font-family:'IBM Plex Mono',monospace;font-size:17px;margin-bottom:5px;font-weight:700;color:var(--text);}

/* results */
.results-header{display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap;margin-bottom:40px;}
.profile-summary h3{font-family:'Fraunces',serif;font-size:24px;margin:0 0 12px;}
[dir="rtl"] .profile-summary h3{font-family:'Noto Naskh Arabic','Fraunces',serif;}
.profile-summary p{color:var(--text-dim);font-size:14px;line-height:1.6;}
.traits-list{list-style:none;padding:0;margin:16px 0 0;font-size:12.5px;}
.traits-list li{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.traits-list b{color:var(--text);font-weight:600;}
.traits-list span{color:var(--teal);font-family:'IBM Plex Mono',monospace;font-weight:600;}

h3.section-h{font-family:'Fraunces',serif;font-size:21px;margin:0 0 6px;}
[dir="rtl"] h3.section-h{font-family:'Noto Naskh Arabic','Fraunces',serif;}
.section-sub{font-size:13px;color:var(--text-faint);margin-bottom:20px;line-height:1.5;}

.career-card{background:var(--paper);color:var(--paper-text);border-radius:var(--r-md);padding:22px 24px;margin-bottom:14px;
  border-inline-start:4px solid var(--coral);}
.career-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:8px;}
.career-top h4{font-family:'Fraunces',serif;font-size:18px;margin:0;}
[dir="rtl"] .career-top h4{font-family:'Noto Naskh Arabic','Fraunces',serif;}
.match-pct{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#B5480E;background:rgba(255,107,91,0.14);padding:5px 11px;border-radius:999px;white-space:nowrap;font-weight:700;}
.career-card p.desc{font-size:13.5px;line-height:1.55;color:#3B4356;margin:0 0 10px;}
.career-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#5B6478;font-family:'IBM Plex Mono',monospace;}
.badge-college{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-weight:700;}
.college-link{color:inherit;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;font-weight:800;cursor:pointer;}
.college-link:hover{text-decoration-style:solid;}
#appToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:999;
  background:var(--paper);color:var(--paper-text);font-size:13px;font-weight:600;padding:12px 20px;border-radius:999px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;max-width:88vw;text-align:center;}
#appToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.badge-verified{background:rgba(45,217,160,0.16);color:#0E7A55;}
.badge-general{background:rgba(154,163,199,0.18);color:#4A5270;}
.ai-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* education */
.major-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.major-card{background:var(--panel);border:1px solid var(--border);padding:20px 22px;border-radius:var(--r-md);cursor:pointer;transition:.15s;}
.major-card:hover{border-color:var(--coral);}
.major-card h5{font-family:'Fraunces',serif;font-size:16.5px;margin:0 0 8px;}
[dir="rtl"] .major-card h5{font-family:'Noto Naskh Arabic','Fraunces',serif;}
.chip{display:inline-block;font-size:10.5px;padding:4px 10px;border-radius:999px;margin:2px 5px 2px 0;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.chip.verified{background:rgba(45,217,160,0.15);color:var(--ok);}
.chip.general{background:rgba(154,163,199,0.15);color:var(--text-dim);}
.course-list{margin-top:14px;font-size:12.5px;color:var(--text-dim);line-height:2;}
.course-list .code{color:var(--teal);font-family:'IBM Plex Mono',monospace;font-weight:700;margin-inline-end:6px;}
.checkbox-row{display:flex;align-items:center;gap:9px;padding:5px 0;}
.checkbox-row input{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;}
.checkbox-row.done label{color:var(--ok);text-decoration:line-through;opacity:0.7;}
.college-tag{font-size:11px;margin-top:10px;padding:6px 10px;border-radius:8px;background:rgba(139,127,255,0.12);color:var(--violet);display:inline-block;font-weight:600;}
.verify-note{font-size:11.5px;color:var(--text-faint);margin-top:10px;font-style:italic;line-height:1.5;}

.careers-for-major{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;}
.careers-for-major .chip{background:rgba(45,217,198,0.14);color:var(--teal);}

.catalog-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.catalog-search{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--border-strong);color:var(--text);
  padding:11px 15px;border-radius:999px;font-size:13.5px;}
.college-chip{background:var(--panel);border:1px solid var(--border-strong);color:var(--text-dim);font-size:12px;font-weight:600;
  padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;}
.college-chip.active{background:linear-gradient(135deg,var(--coral),var(--gold));color:#0A0E27;border-color:transparent;}
.catalog-count{font-size:12px;color:var(--text-faint);margin-bottom:14px;}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(230px,1fr));gap:10px;}
.catalog-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;}
.catalog-card h6{font-family:'Fraunces',serif;font-size:14.5px;margin:0 0 8px;font-weight:600;}
[dir="rtl"] .catalog-card h6{font-family:'Noto Naskh Arabic','Fraunces',serif;}
.catalog-card .row{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;color:var(--text-faint);}
.catalog-card .colleges{display:flex;gap:3px;flex-wrap:wrap;}
.catalog-card .college-dot{width:22px;height:17px;border-radius:4px;font-size:8.5px;display:flex;align-items:center;justify-content:center;
  font-weight:800;background:var(--panel-solid);color:var(--text-dim);border:1px solid var(--border);text-decoration:none;transition:.12s;}
.catalog-card a.college-dot:hover{background:var(--coral);color:#0A0E27;border-color:var(--coral);}
.catalog-card .ai-pill{font-family:'IBM Plex Mono',monospace;font-weight:700;padding:2px 7px;border-radius:999px;}
.degree-chip{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;
  background:rgba(139,127,255,0.16);color:var(--violet);margin:6px 4px 0 0;}
.degree-chip.na{background:rgba(154,163,199,0.14);color:var(--text-faint);font-style:italic;font-weight:500;}
.degree-approx-note{font-size:9.5px;color:var(--text-faint);font-style:italic;margin-top:4px;display:block;}
.ai-methodology{font-size:11.5px;color:var(--text-faint);line-height:1.6;margin:14px 0 22px;font-style:italic;}

.key-dates{display:flex;flex-direction:column;gap:10px;margin-top:24px;}

.calendar-search-row{display:flex;gap:10px;margin:18px 0 22px;flex-wrap:wrap;}
.calendar-search-row input{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--border-strong);color:var(--text);
  padding:11px 15px;border-radius:999px;font-size:13.5px;}
.calendar-match-card{background:var(--paper);color:var(--paper-text);border-radius:var(--r-md);padding:18px 20px;margin-bottom:20px;border-inline-start:4px solid var(--gold);}
.calendar-match-card h5{font-family:'Fraunces',serif;font-size:17px;margin:0 0 8px;}
.calendar-match-card .win-row{font-size:12.5px;color:#3B4356;margin-bottom:4px;}
.calendar-match-card .win-row b{color:#1C2340;}
.calendar-match-card .note{font-size:11.5px;color:#5B6478;font-style:italic;margin-top:8px;}
.calendar-grid-12{display:grid;grid-template-columns:repeat(auto-fill, minmax(190px,1fr));gap:12px;}
.month-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 12px 14px;}
.month-card h6{font-family:'IBM Plex Mono',monospace;font-size:11.5px;text-align:center;margin:0 0 8px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;}
.month-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.month-days .day-cell{aspect-ratio:1;border-radius:3px;font-size:8px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);background:rgba(255,255,255,0.02);position:relative;}
.month-days .day-cell.active{color:#0A0E27;font-weight:700;}
.month-days .day-cell.dimmed{opacity:0.15;}
.calendar-legend{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 6px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-dim);}
.legend-dot{width:10px;height:10px;border-radius:3px;flex:none;}
.unverified-list{margin-top:20px;display:flex;flex-direction:column;gap:8px;}
.unverified-row{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 15px;font-size:12px;}
.unverified-row b{color:var(--text);}
.unverified-row .u-note{color:var(--text-faint);font-style:italic;display:block;margin-top:3px;}
.key-date-row{display:flex;justify-content:space-between;gap:12px;background:var(--panel);border:1px solid var(--border);padding:13px 16px;border-radius:var(--r-sm);font-size:12.5px;}
.key-date-row b{color:var(--text);}
.key-date-row span{color:var(--text-faint);font-family:'IBM Plex Mono',monospace;font-size:11.5px;}

/* advisor */
.advisor-wrap{display:flex;flex-direction:column;height:540px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.advisor-messages{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:13.5px;line-height:1.55;}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--coral),var(--gold));color:#0A0E27;font-weight:600;}
[dir="rtl"] .msg.user{align-self:flex-start;}
.msg.bot{align-self:flex-start;background:rgba(255,255,255,0.05);border:1px solid var(--border);white-space:pre-wrap;}
[dir="rtl"] .msg.bot{align-self:flex-end;}
.msg.bot.loading{color:var(--text-faint);font-style:italic;}
.advisor-input-row{display:flex;gap:8px;padding:14px;border-top:1px solid var(--border);}
.advisor-input-row textarea{flex:1;resize:none;background:rgba(255,255,255,0.04);border:1px solid var(--border-strong);color:var(--text);
  padding:11px 13px;font-family:'Inter',sans-serif;font-size:13.5px;border-radius:12px;}
.advisor-input-row button{background:linear-gradient(135deg,var(--coral),var(--gold));border:none;color:#0A0E27;font-weight:800;padding:0 22px;border-radius:12px;cursor:pointer;}
.advisor-input-row button:disabled{opacity:.4;cursor:not-allowed;}
.attach-btn{background:var(--panel-2)!important;color:var(--text)!important;font-size:16px;padding:0 14px!important;flex:none;}
.attach-btn:hover{background:var(--panel-solid)!important;}
.attachment-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(139,127,255,0.14);color:var(--violet);
  font-size:12px;padding:7px 12px;border-radius:999px;margin:0 14px 8px;}
.attachment-chip button{background:none;border:none;color:var(--violet);cursor:pointer;font-size:12px;padding:0;}
.attachment-chip-inline{font-size:10.5px;opacity:0.75;margin-top:6px;}
.advisor-empty{color:var(--text-faint);font-size:13px;text-align:center;margin-top:36px;line-height:1.8;}
.advisor-empty b{color:var(--text);}

@media(max-width:640px){
  .major-grid{grid-template-columns:1fr;}
  .dim-preview{grid-template-columns:repeat(2,1fr);}
  .dash-grid{grid-template-columns:1fr;}
  nav{width:100%;}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   I18N — UI strings, dimension labels, question texts (5 langs)
   ============================================================ */
const LANGS = ["ru","en","es","ar","fa"];
const RTL = {ar:true, fa:true};
const LANG_NAMES = {ru:"Русский", en:"English", es:"Español", ar:"العربية", fa:"فارسی"};

const DIM_KEYS = ["people","data","things","ideas","structure","independence","leadership","detail"];
const DIMENSIONS = {

es:["Me gusta que mi trabajo implique interactuar constantemente con personas.","Capto rápidamente el estado emocional de alguien y me adapto a él.","Ayudar a alguien a resolver un problema me satisface más que resolverlo yo sola.","Estoy dispuesta a explicar lo mismo a distintas personas una y otra vez si de verdad les ayuda.","Un trabajo donde paso todo el día sola sin contacto con gente me agota.","Me resulta fácil generar confianza con personas que acabo de conocer.","Si tuviera que elegir, prefiero un trabajo \"con personas\" antes que uno \"con papeles/datos\".",
"Disfruto encontrando patrones en números y datos.","Me satisface descomponer un problema complejo en pasos lógicos.","Las tablas, informes y estadísticas no me asustan — me atraen.","Prefiero verificar hechos y datos en vez de asumir que \"así está bien\".","Me interesa automatizar procesos rutinarios mediante análisis de datos.","Detecto errores de cálculo o de lógica más rápido que la mayoría.","Prefiero pasar una tarde analizando estadísticas que charlando de cosas sin importancia.",
"Me gusta entender cómo funcionan los sistemas técnicos por dentro.","Prefiero leer el manual y desarmar algo yo misma antes que llamar a otra persona.","Trabajar con equipos o tecnología en un sentido amplio (incluyendo hardware o sistemas informáticos) me atrae.","Me importa ver un resultado físico o técnico de mi trabajo.","Configurar sistemas, programas o equipos es algo que podría hacer durante horas.","Prefiero arreglar o configurar algo yo misma antes que pagarle a alguien, si tengo tiempo.","Me atrae trabajar con autos, maquinaria o sistemas informáticos.",

"Me siento más cómoda cuando mi día tiene un plan y una rutina claros.","Los cambios de planes impredecibles me desestabilizan.","Prefiero saber de antemano qué se espera de mí, en vez de improvisar sobre la marcha.","Las reglas y procedimientos claros facilitan mi trabajo, no me molestan.","Necesito que las tareas estén bien estructuradas, no \"ya lo irás descubriendo\".","Trabajo mejor en un entorno estable y predecible que en un caos constante.","Cambiar de tarea cada 20 minutos me agota más de lo que me energiza.",
"Soy más productiva cuando soy responsable de todo el proceso, sin supervisión constante.","Me incomoda cuando una decisión debe tomarse en grupo en vez de por mi cuenta.","Prefiero resolver una tarea yo misma antes que pedir ayuda en cada paso.","Trabajar sola no me asusta — al contrario, me da libertad.","Me importa poder tomar decisiones sin necesitar aprobación constante.","Me canso más rápido de las discusiones grupales largas que del trabajo en solitario.","Confío más en mis propias conclusiones que en la opinión de la mayoría.",
"Me gusta asumir la responsabilidad por el resultado de un grupo.","Frecuentemente termino siendo quien organiza y dirige a los demás.","Me siento cómoda tomando decisiones que afectarán a otras personas.","Me gusta persuadir y liderar, no solo ejecutar instrucciones.","El rol de \"capitana\" en un proyecto me atrae más que el de ejecutora.","Tomo la iniciativa fácilmente cuando veo que un proceso va por mal camino.","Me importa ver cómo mi liderazgo ayuda a un equipo a lograr resultados.",

"ألاحظ الأخطاء الصغيرة التي يغفل عنها الآخرون.","من المهم لي أن يتم كل شيء بدقة ودون أخطاء حتى لو استغرق وقتاً أطول.","مراجعة التفاصيل والتدقيق لا يرهقني — أتعامل معه بهدوء.","أشعر بارتياح أكبر في العمل وفق بروتوكول صارم حيث كل تفصيل مهم.","أفضل إعادة العمل على تسليمه بخلل بسيط.","العمل الذي يتطلب الدقة (المستندات، البيانات، الشيفرة، الجرعات) لا يخيفني.","من الأسهل علي ملاحظة خطأ في نظام ما من رؤية الصورة الكاملة فوراً."],
fa:["دوست دارم کارم شامل ارتباط مداوم با مردم باشد.","سریع حالت احساسی افراد را متوجه می‌شوم و خودم را با آن تطبیق می‌دهم.","کمک به کسی برای حل مشکلش برایم رضایت‌بخش‌تر از حل تنهایی آن است.","حاضرم یک موضوع را بارها برای افراد مختلف توضیح دهم اگر واقعاً به آن‌ها کمک کند.","کاری که تمام روز تنها بدون تماس با مردم باشم خسته‌ام می‌کند.","برایم آسان است که با افراد تازه‌آشنا اعتماد ایجاد کنم.","اگر مساوی باشد، شغل «با مردم» را به شغل «با کاغذبازی/داده» ترجیح می‌دهم.",

"وقتی روزم برنامه و روال مشخصی دارد راحت‌ترم.","تغییرات غیرمنتظره در برنامه‌ها مرا از تعادل خارج می‌کند.","ترجیح می‌دهم از قبل بدانم چه انتظاری از من می‌رود تا اینکه فی‌البداهه عمل کنم.","قوانین و رویه‌های روشن کارم را آسان‌تر می‌کنند، نه آزاردهنده.","لازم دارم وظایف به‌وضوح ساختاریافته باشند، نه اینکه «در حین کار بفهمم».","در محیط پایدار و قابل‌پیش‌بینی بهتر از هرج‌ومرج مداوم کار می‌کنم.","تغییر وظیفه هر ۲۰ دقیقه بیشتر خسته‌ام می‌کند تا اینکه انرژی بدهد.",

 ARC:"https://arc.losrios.edu/2025-2026-official-catalog/programs-of-study/list-of-degrees-and-certificates",
 SCC:"https://scc.losrios.edu/2025-2026-official-catalog/programs-of-study/list-of-degrees-and-certificates",

};

/* Build a direct link to a program's page on a college site, opening the
   "Degrees and Certificates" tab (?tab=2). Pattern verified by user:
   https://flc.losrios.edu/academics/programs-majors/administration-of-justice?tab=2
   Slugs are generated from the program name; a few unusual names may not
   match the college's actual slug — those will 404 and can be hand-fixed. */
function programSlug(name){
  return name
    .toLowerCase()
    .replace(/\(.*?\)/g, "")        // drop parenthetical parts: "(ESL)", "(CNC)"
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, "-")     // slashes, commas, spaces -> hyphen
    .replace(/^-+|-+$/g, "");
}
function programURL(collegeCode, programName){
  return `https://${collegeCode.toLowerCase()}.losrios.edu/academics/programs-majors/${programSlug(programName)}?tab=2`;
}

function collegeCodesFromField(str){
  if(str==="all4") return ["ARC","SCC","CRC","FLC"];
  return str.split("/").map(s=>s.trim()).filter(Boolean);
}

/* Sandboxed environments (like the Claude artifact viewer) often block
   opening external links. Try to open; if blocked, copy the URL to the
   clipboard and tell the user, instead of failing silently. */
function openExternal(url){
  let opened = null;
  try { opened = window.open(url, "_blank", "noopener,noreferrer"); } catch(e){ opened = null; }
  if(!opened){
    const fallback = ()=>{
      try{
        const ta = document.createElement("textarea");
        ta.value = url; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
        showToast(t().linkCopied);
      }catch(e){ showToast(url); }
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(()=>showToast(t().linkCopied)).catch(fallback);
    } else { fallback(); }
  }
}
let toastTimer = null;
function showToast(msg){
  let el = document.getElementById("appToast");
  if(!el){
    el = document.createElement("div");
    el.id = "appToast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 3500);
}

function collegeLinksHTML(str){
  return collegeCodesFromField(str).map(code=>
    `<a href="${COLLEGE_LINKS[code]}" class="college-link" data-ext="${COLLEGE_LINKS[code]}">${code}</a>`
  ).join(" ");
}

/* Global click interceptor for all external links */
document.addEventListener("click", (e)=>{
  const a = e.target.closest("a[data-ext]");
  if(a){
    e.preventDefault();
    openExternal(a.getAttribute("data-ext"));
  }
}, true);

function dateInWindow(month, day, w){
  // handles windows that span across the New Year (e.g. Oct -> Apr)
  const start = w.startM*100 + w.startD;
  const end = w.endM*100 + w.endD;
  const cur = month*100 + day;
  if(start <= end) return cur >= start && cur <= end;
  return cur >= start || cur <= end; // wraps around Dec->Jan
}

  lang: "ru",
  screen: "dash",
  qIndex: 0,
  answers: {},

  lastTestDate: null,

async function loadPersisted(){
  try{
    const r = await window.storage.get("compass_state");
    if(r && r.value){
      const saved = JSON.parse(r.value);
      state = {...state, ...saved, screen: saved.results ? "dash" : "dash", advisorMessages: saved.advisorMessages||[], advisorLoading:false};
    }
  }catch(e){ /* no saved state yet */ }
  state.loaded = true;
  render();
}
let saveTimer=null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const slimMessages = state.advisorMessages.map(m=>{
        if(Array.isArray(m.content)){
          const tb = m.content.find(b=>b.type==="text");
          return {role:m.role, content: tb ? tb.text : "", attachmentName: m.attachmentName};
        }
        return m;
      });
      const toSave = {lang:state.lang, answers:state.answers, results:state.results, lastTestDate:state.lastTestDate, checklist:state.checklist, advisorMessages:slimMessages};
      await window.storage.set("compass_state", JSON.stringify(toSave));
    }catch(e){}
  }, 400);
}

function t(){ return UI[state.lang]; }
function isRTL(){ return !!RTL[state.lang]; }
function tf(obj){ return obj[state.lang] || obj.ru; }

/* ============================================================
   SCORING
   ============================================================ */
function computeResults(){
  const sums={}, counts={};
  DIM_KEYS.forEach(d=>{sums[d]=0;counts[d]=0;});
  Q_DIMS.forEach((d,i)=>{ const v=state.answers[i]; if(v!=null){ sums[d]+=v; counts[d]++; } });
  const scores={};
  DIM_KEYS.forEach(d=> scores[d] = counts[d] ? sums[d]/counts[d] : 3);

  const matches = CAREERS.map(c=>{
    let sq=0;
    DIM_KEYS.forEach(d=>{ const diff=(scores[d]||3)-c.dims[d]; sq+=diff*diff; });
    const dist=Math.sqrt(sq);
    const maxDist=Math.sqrt(DIM_KEYS.length*16);
    const pct=Math.max(0, Math.round((1-dist/maxDist)*100));
    return {...c, pct};
  }).sort((a,b)=>b.pct-a.pct);

  state.results={scores, matches};
  state.lastTestDate = new Date().toISOString();
  persist();
}
function topDims(scores,n){ return Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,n).map(e=>e[0]); }
function whyFit(career, scores){
  const userTop=topDims(scores,3);
  const careerTop=Object.entries(career.dims).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  const overlap=userTop.filter(d=>careerTop.includes(d));
  const dl = DIMENSIONS;
  if(overlap.length===0) return null;
  return overlap.map(d=>tf(dl[d])).join(", ");
}
function monthsSince(iso){
  if(!iso) return 999;
  const d=new Date(iso);
  return (Date.now()-d.getTime())/(1000*60*60*24*30);
}

const app = document.getElementById("app");

function render(){
  if(!state.loaded) return;
  document.documentElement.setAttribute("dir", isRTL() ? "rtl" : "ltr");
  document.documentElement.setAttribute("lang", state.lang);
  app.innerHTML="";
  app.appendChild(renderHeader());
  const main=document.createElement("main");
  main.appendChild(renderDisclaimer());
  if(state.screen==="dash") main.appendChild(renderDash());
  else if(state.screen==="test") main.appendChild(renderTest());
  else if(state.screen==="results") main.appendChild(renderResults());
  else if(state.screen==="education") main.appendChild(renderEducation());
  else if(state.screen==="catalog") main.appendChild(renderCatalog());
  else if(state.screen==="advisor") main.appendChild(renderAdvisor());
  app.appendChild(main);
  if(state.screen==="advisor") scrollAdvisorToBottom();
}

function renderHeader(){

      <path d="M20 35 L16 21 L20 19 L24 21 Z" fill="#2DD9C6"/>
      <circle cx="20" cy="20" r="2.6" fill="#F1F3FA"/>
    </svg>
    <div><h1>${t().appName}</h1><p>${t().tagline}</p></div>
  `;
  header.appendChild(brandWrap);

  const controls=document.createElement("div");
  controls.className="top-controls";
  const sel=document.createElement("select");
  sel.id="langSel";
  LANGS.forEach(l=>{ const o=document.createElement("option"); o.value=l; o.textContent=LANG_NAMES[l]; if(l===state.lang) o.selected=true; sel.appendChild(o); });
  sel.onchange=()=>{ state.lang=sel.value; persist(); render(); };
  controls.appendChild(sel);

  const nav=document.createElement("nav");
  const items=[["dash",t().navDash],["test",t().navTest],["results",t().navResults],["education",t().navEdu],["catalog",t().navCatalog],["advisor",t().navAdvisor]];
  items.forEach(([key,label])=>{
    const b=document.createElement("button");
    b.textContent=label;
    if(state.screen===key) b.className="active";
    if(key==="results" && !state.results) b.disabled=true;
    b.onclick=()=>{ state.screen=key; render(); };
    nav.appendChild(b);
  });
  controls.appendChild(nav);
  header.appendChild(controls);
  return header;
}

function renderDash(){
  const el=document.createElement("div");
  if(!state.results){
    el.innerHTML=`

    el.querySelector("#startBtn").onclick=()=>{ state.screen="test"; state.qIndex=0; render(); };

  }

  const {scores, matches}=state.results;
  const top1 = topDims(scores,1).map(d=>tf(DIMENSIONS[d]))[0];

function radarSVG(scores){
  const dims=DIM_KEYS; const n=dims.length; const cx=150, cy=150, R=105;
  const pts=dims.map((d,i)=>{ const a=(Math.PI*2*i/n)-Math.PI/2; const r=R*(scores[d]/5); return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; });
  const ring=(f)=>dims.map((d,i)=>{ const a=(Math.PI*2*i/n)-Math.PI/2; return [cx+R*f*Math.cos(a), cy+R*f*Math.sin(a)]; }).map(p=>p.join(",")).join(" ");
  const poly=pts.map(p=>p.join(",")).join(" ");
  const labels=dims.map((d,i)=>{ const a=(Math.PI*2*i/n)-Math.PI/2; const lr=R+28; const x=cx+lr*Math.cos(a), y=cy+lr*Math.sin(a);
    return `<text x="${x}" y="${y}" font-size="10" fill="#9AA3C7" text-anchor="middle" font-family="IBM Plex Mono, monospace">${tf(DIMENSIONS[d])}</text>`; }).join("");
  return `<svg width="300" height="300" viewBox="0 0 300 300">
    <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B5B" stop-opacity="0.35"/><stop offset="100%" stop-color="#2DD9C6" stop-opacity="0.35"/></linearGradient></defs>
    <polygon points="${ring(1)}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <polygon points="${ring(0.66)}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <polygon points="${ring(0.33)}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <polygon points="${poly}" fill="url(#rg)" stroke="#FF6B5B" stroke-width="2"/>
    ${labels}</svg>`;
}

        daysHtml += `<div class="day-cell${bg?' active':''}${isDimmed?' dimmed':''}" style="${bg?`background:${bg}`:''}">${d}</div>`;

function buildAdvisorSystemPrompt(){
  const langName = LANG_NAMES[state.lang];
  let ctx = `You are an AI education & career advisor for students at the Los Rios Community College District (American River College, Sacramento City College, Cosumnes River College, Folsom Lake College) in California. Respond in ${langName} (the student's chosen app language) unless they write in a different language, in which case follow their language. Be concrete and practical, no fluff or generic motivational language. If unsure about a current requirement, say so honestly and suggest checking assist.org or a counselor — never invent numbers. Note: Los Rios is mid-transition to a new statewide Common Course Numbering (CCN) system as of Fall 2026, so some course numbers are actively changing.

The student can attach a transcript, unofficial transcript screenshot, or a photo/PDF of their completed course list. When they do:
- Read every course, grade, and unit value you can see in the image/document.
- California community college Associate degrees generally require a minimum of 60 semester units (mix of major/GE/elective, varies by degree — this is a general baseline, not exact per program).
- Certificates vary widely in unit count (often 12-30+ units) — do not assume 60 units applies to certificates.
- Add up the units you can clearly read, tell the student your running total, and say clearly which courses you weren't able to read confidently (image quality, cropped, handwriting) rather than guessing at unclear ones.
- Estimate roughly how many units/credits likely remain toward an AA/AS (or the specific major discussed), but ALWAYS caveat that this is your own estimate from an unofficial document, not a substitute for an official Degree Audit / counselor evaluation, since general education patterns and specific major requirements affect the real number.
- If a course name/number looks like it's already been renamed under the CCN transition, mention that too.`;
  if(state.results){
    const {scores, matches}=state.results;
    const topD=topDims(scores,3).map(d=>tf(DIMENSIONS[d])).join(", ");
    const topC=matches.slice(0,3).map(c=>tf(c.t).name).join(", ");
    ctx += ` Student's test profile — strongest traits: ${topD}. Top career matches: ${topC}.`;
  }
  const doneCourses = Object.entries(state.checklist).filter(([k,v])=>v).map(([k])=>k);
  if(doneCourses.length){
    ctx += ` Courses the student has already checked off in-app as completed: ${doneCourses.join(", ")}.`;
  }
  const majorsSummary = MAJORS.map(m=>`${m.name} (${m.college}): ${m.courses.map(c=>c.title).join("; ")}`).join(" | ");
  ctx += ` Reference — course requirements this app already knows for a few curated majors: ${majorsSummary}`;
  return ctx;
}

async function sendAdvisorMessage(text){
  let content;
  const att = state.pendingAttachment;
  if(att){
    content = [
      { type: att.kind, source: { type:"base64", media_type: att.mediaType, data: att.base64 } },
      { type:"text", text: text || (state.lang==="ru" ? "Проанализируй, пожалуйста, этот документ." : "Please analyze this document.") }
    ];
  } else {
    content = text;
  }
  state.advisorMessages.push({role:"user", content, attachmentName: att ? att.name : null});
  state.pendingAttachment = null;
  state.advisorLoading=true; persist(); render();
  try{
    const apiMessages = state.advisorMessages.map(m=>({role:m.role, content:m.content}));
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1500, system: buildAdvisorSystemPrompt(), messages: apiMessages })
    });
    const data = await response.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text);
    const reply = textBlocks.join("\\n") || "…";
    state.advisorMessages.push({role:"assistant", content:reply});
  }catch(e){
    state.advisorMessages.push({role:"assistant", content:"Connection error. Please try again."});
  }
  state.advisorLoading=false; persist(); render();
}

function handleAdvisorFile(file){
  const MAX_BYTES = 15*1024*1024; // 15MB safety cap
  if(file.size > MAX_BYTES){
    alert(t().attachTooLarge);
    return;
  }
  const isPdf = file.type === "application/pdf";
  const isImage = file.type.startsWith("image/");
  if(!isPdf && !isImage){
    alert(t().attachUnsupported);
    return;
  }
  const reader = new FileReader();
  reader.onload = ()=>{
    const base64 = reader.result.split(",")[1];
    state.pendingAttachment = { name:file.name, mediaType:file.type, base64, kind: isPdf ? "document" : "image" };
    render();
  };
  reader.readAsDataURL(file);
}

  } else {
    state.advisorMessages.forEach(m=>{
      const d=document.createElement("div");
      d.className="msg "+(m.role==="user"?"user":"bot");
      let textOut = "";
      if(Array.isArray(m.content)){
        const tb = m.content.find(b=>b.type==="text");
        textOut = tb ? tb.text : "";
      } else {
        textOut = m.content;
      }
      d.textContent = textOut;
      if(m.attachmentName){
        const chip=document.createElement("div");
        chip.className="attachment-chip-inline";
        chip.textContent = "📎 "+m.attachmentName;
        d.appendChild(chip);
      }
      msgsBox.appendChild(d);
    });
    if(state.advisorLoading){
      const d=document.createElement("div"); d.className="msg bot loading"; d.textContent="…"; msgsBox.appendChild(d);
    }
  }

  const previewBox = el.querySelector("#attachmentPreview");
  if(state.pendingAttachment){
    previewBox.innerHTML = `<div class="attachment-chip">📎 ${state.pendingAttachment.name} <button id="removeAttach" type="button">✕</button></div>`;
    previewBox.querySelector("#removeAttach").onclick=()=>{ state.pendingAttachment=null; render(); };
  }

  const fileInput = el.querySelector("#advisorFile");
  el.querySelector("#advisorAttachBtn").onclick=()=>fileInput.click();
  fileInput.onchange=(e)=>{ if(e.target.files[0]) handleAdvisorFile(e.target.files[0]); fileInput.value=""; };

  const input=el.querySelector("#advisorInput");
  const send=()=>{
    const val=input.value.trim();
    if((!val && !state.pendingAttachment) || state.advisorLoading) return;
    input.value="";
    sendAdvisorMessage(val);
  };
  el.querySelector("#advisorSend").onclick=send;
  input.addEventListener("keydown",(e)=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); } });
  return el;
}
function scrollAdvisorToBottom(){ const box=document.getElementById("advisorMsgs"); if(box) box.scrollTop=box.scrollHeight; }

loadPersisted();
</script>
</body>
</html>
