<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — Los Rios career & education navigator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@500;700&family=Noto+Sans+Arabic:wght@400;600&display=swap');

/* ============================================================
   Los Rios district design language (tokens extracted from
   losriosmin.css / arcmin / sccmin / crcmin / flcmin):
   navy #252D65, action blue #215DD6, sky #9CCEEB, gold #E5BF45,
   grays #F7F7F9 / #C8CBCE / #6E7177 / #374049 / #292E38,
   Source Sans Pro body + Libre Baskerville headings, flat
   surfaces, 1rem radii, white header with 8px navy rule.
   College brands: ARC #BA0C2F · SCC #8A0028 · CRC #F26E21 · FLC #6C2991
   ============================================================ */
:root{
  --bg-0:#F7F7F9;
  --bg-1:#FFFFFF;
  --panel:#FFFFFF;
  --panel-solid:#EEEEF2;
  --border:#D9DADF;
  --border-strong:#C8CBCE;
  --coral:#252D65;
  --coral-bright:#215DD6;
  --teal:#215DD6;
  --gold:#E5BF45;
  --gold-text:#8A6D3B;
  --sky:#9CCEEB;
  --violet:#252D65;
  --text:#292E38;
  --text-dim:#374049;
  --text-faint:#6E7177;
  --paper:#FFFFFF;
  --paper-text:#292E38;
  --ok:#3C763D;
  --warn:#8A6D3B;
  --danger:#A94442;
  --arc:#BA0C2F;--scc:#8A0028;--crc:#F26E21;--flc:#6C2991;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg-0);color:var(--text);font-family:'Source Sans Pro','Arial',sans-serif;}
body{
  background:var(--bg-0);
  min-height:100vh;
}
[dir="rtl"] body{font-family:'Noto Sans Arabic','Source Sans Pro',sans-serif;}
[dir="rtl"] .disp{font-family:'Noto Naskh Arabic','Libre Baskerville',serif;}

#app{min-height:100vh;position:relative;}
.disp{font-family:'Libre Baskerville','Times New Roman',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}

header{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding:14px 28px;border-bottom:8px solid var(--coral);
  background:#FFFFFF;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand svg{width:36px;height:36px;flex:none;}
.brand h1{font-family:'Libre Baskerville','Times New Roman',serif;font-size:19px;margin:0;font-weight:700;color:var(--coral);}
.brand p{margin:0;font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;}

.top-controls{display:flex;gap:10px;align-items:center;}
select#langSel{
  background:var(--panel-solid);border:1px solid var(--border-strong);color:var(--text);
  font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:var(--r-md);cursor:pointer;
  appearance:none;-webkit-appearance:none;
}

nav{display:flex;gap:3px;flex-wrap:wrap;}
nav button{
  font-size:13px;font-weight:600;background:transparent;border:1px solid transparent;
  color:var(--coral);padding:9px 15px;border-radius:var(--r-md);cursor:pointer;transition:.15s;white-space:nowrap;
}
nav button:hover{color:var(--coral);background:#EDF1FB;}
nav button.active{color:#FFFFFF;background:var(--coral);font-weight:700;}
nav button:disabled{opacity:.3;cursor:not-allowed;}

main{position:relative;max-width:960px;margin:0 auto;padding:36px 24px 110px;}

.disclaimer{
  display:flex;gap:10px;align-items:flex-start;background:#FCF8E3;
  border:1px solid #E5D99E;border-inline-start:4px solid var(--gold);padding:13px 16px;border-radius:var(--r-sm);
  font-size:12px;color:#8A6D3B;line-height:1.55;margin-bottom:26px;
}
.disclaimer b{color:var(--gold-text);}

.ccn-alert{
  background:#EDF1FB;
  border:1px solid var(--sky);border-inline-start:4px solid var(--coral-bright);border-radius:var(--r-md);padding:18px 20px;margin-bottom:26px;
}
.ccn-alert .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  background:var(--coral);color:#FFFFFF;padding:3px 10px;border-radius:999px;margin-bottom:10px;}
.ccn-alert p{margin:0;font-size:13px;line-height:1.6;color:var(--text-dim);}
.ccn-alert b{color:var(--text);}

.eyebrow{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--coral-bright);margin-bottom:10px;font-weight:700;}
h2.title{font-family:'Libre Baskerville','Times New Roman',serif;font-size:clamp(25px,4vw,36px);font-weight:700;line-height:1.22;margin:0 0 16px;color:var(--coral);}
[dir="rtl"] h2.title{font-family:'Noto Naskh Arabic','Libre Baskerville','Times New Roman',serif;background:none;-webkit-text-fill-color:var(--text);color:var(--text);}
.lede{font-size:15px;color:var(--text-dim);max-width:600px;line-height:1.65;margin-bottom:30px;}

.btn-primary{
  font-weight:700;font-size:14.5px;color:#FFFFFF;border:none;padding:14px 28px;border-radius:var(--r-md);cursor:pointer;
  background:var(--coral-bright);box-shadow:none;
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn-primary:hover{background:#1A4CB0;}
.btn-ghost{
  font-weight:700;font-size:13px;color:var(--coral);background:var(--panel);border:1px solid var(--border-strong);
  padding:10px 18px;border-radius:var(--r-md);cursor:pointer;
}
.btn-ghost:hover{background:#E2E9F0;}

.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px;}

/* dashboard */
.dash-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:28px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-md);padding:20px 22px;}
.stat-card .num{font-family:'Libre Baskerville','Times New Roman',serif;font-size:32px;font-weight:700;margin:2px 0 4px;color:var(--coral);}
.stat-card .lbl{font-size:11.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;}
.progress-bar{height:8px;border-radius:99px;background:#E2E9F0;overflow:hidden;margin-top:10px;}
.progress-bar .fill{height:100%;border-radius:99px;background:var(--coral-bright);}

.dim-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border);margin-top:8px;}
.dim-preview div{background:var(--panel-solid);padding:14px 12px;font-size:11px;color:var(--text-faint);}
.dim-preview div b{display:block;color:var(--text);font-size:10.5px;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}

/* test */
.test-wrap{max-width:660px;}
.back-link{background:none;border:none;color:var(--text-faint);font-size:12.5px;cursor:pointer;margin-bottom:16px;padding:0;}
.back-link:hover{color:var(--coral-bright);}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);margin-bottom:8px;}
.progress-track{height:4px;background:#E2E9F0;border-radius:99px;margin-bottom:32px;overflow:hidden;}
.progress-fill{height:100%;background:var(--coral-bright);border-radius:99px;transition:width .25s;}

.question-card{background:#FFFFFF;border:1px solid var(--border-strong);box-shadow:0 2px 12px rgba(20,41,61,0.07);
  padding:38px 34px;border-radius:var(--r-lg);}
.q-dim-tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--bg-0);text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:16px;background:var(--coral);padding:4px 11px;border-radius:var(--r-sm);font-weight:700;}
.q-text{font-family:'Libre Baskerville','Times New Roman',serif;font-size:23px;line-height:1.42;margin:0 0 30px;font-weight:600;}
[dir="rtl"] .q-text{font-family:'Noto Naskh Arabic','Libre Baskerville','Times New Roman',serif;font-size:21px;}
.scale-row{display:flex;gap:8px;flex-wrap:wrap;}
.scale-btn{
  flex:1;min-width:90px;padding:15px 8px;background:#F6F9FC;border:1px solid var(--border);color:var(--text-dim);
  font-size:11px;text-align:center;cursor:pointer;border-radius:var(--r-sm);transition:.13s;line-height:1.3;
}
.scale-btn:hover{border-color:var(--coral-bright);color:var(--text);background:#EDF1FB;transform:translateY(-2px);}
.scale-num{display:block;font-family:'IBM Plex Mono',monospace;font-size:17px;margin-bottom:5px;font-weight:700;color:var(--text);}
.goal-row{display:flex;flex-direction:column;gap:10px;}
.goal-btn{background:#F6F9FC;border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;cursor:pointer;transition:.13s;}
.goal-btn:hover{border-color:var(--coral-bright);background:#EDF1FB;}
.goal-btn b{display:block;font-size:14.5px;color:var(--coral);margin-bottom:3px;}
.goal-btn span{font-size:12.5px;color:var(--text-dim);line-height:1.45;}
.rec-path{background:#EDF1FB;border-inline-start:3px solid var(--coral-bright);padding:9px 13px;border-radius:var(--r-sm);font-size:12.5px;line-height:1.55;margin:10px 0;color:var(--text-dim);}
.rec-path b{color:var(--coral);}
.rec-path .rec-units{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--coral-bright);}
.rec-path a{color:var(--coral-bright);font-weight:700;cursor:pointer;}
.results-share{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 22px;}
.goal-chip{display:inline-block;background:var(--coral);color:#FFF;font-size:11px;font-weight:700;padding:4px 12px;border-radius:var(--r-md);margin-inline-start:8px;vertical-align:middle;}

/* results */
.results-header{display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap;margin-bottom:40px;}
.profile-summary h3{font-family:'Libre Baskerville','Times New Roman',serif;font-size:24px;margin:0 0 12px;}
[dir="rtl"] .profile-summary h3{font-family:'Noto Naskh Arabic','Libre Baskerville','Times New Roman',serif;}
.profile-summary p{color:var(--text-dim);font-size:14px;line-height:1.6;}
.traits-list{list-style:none;padding:0;margin:16px 0 0;font-size:12.5px;}
.traits-list li{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.traits-list b{color:var(--text);font-weight:600;}
.traits-list span{color:var(--teal);font-family:'IBM Plex Mono',monospace;font-weight:600;}

h3.section-h{font-family:'Libre Baskerville','Times New Roman',serif;font-size:21px;margin:0 0 6px;}
[dir="rtl"] h3.section-h{font-family:'Noto Naskh Arabic','Libre Baskerville','Times New Roman',serif;}
.section-sub{font-size:13px;color:var(--text-faint);margin-bottom:20px;line-height:1.5;}

.career-card{background:var(--paper);color:var(--paper-text);border-radius:var(--r-md);padding:22px 24px;margin-bottom:14px;border:1px solid var(--border);
  border-inline-start:4px solid var(--coral);}
.career-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:8px;}
.career-top h4{font-family:'Libre Baskerville','Times New Roman',serif;font-size:18px;margin:0;}
[dir="rtl"] .career-top h4{font-family:'Noto Naskh Arabic','Libre Baskerville','Times New Roman',serif;}
.match-pct{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--coral);background:#EDF1FB;padding:5px 11px;border-radius:999px;white-space:nowrap;font-weight:700;}
.career-card p.desc{font-size:13.5px;line-height:1.55;color:#3B4356;margin:0 0 10px;}
.career-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#5B6478;font-family:'IBM Plex Mono',monospace;}
.badge-college{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-weight:700;}
.college-link{color:inherit;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;font-weight:800;cursor:pointer;}
.college-link:hover{text-decoration-style:solid;}
#appToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:999;
  background:var(--paper);color:var(--paper-text);font-size:13px;font-weight:600;padding:12px 20px;border-radius:999px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;max-width:88vw;text-align:center;}
#appToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.badge-verified{background:rgba(46,133,64,0.14);color:#0E7A55;}
.badge-general{background:rgba(154,163,199,0.18);color:#4A5270;}
.ai-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* education */
.major-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.major-card{background:var(--panel);border:1px solid var(--border);padding:20px 22px;border-radius:var(--r-md);cursor:pointer;transition:.15s;}
.major-card:hover{border-color:var(--coral);}
.major-card h5{font-family:'Libre Baskerville','Times New Roman',serif;font-size:16.5px;margin:0 0 8px;}
[dir="rtl"] .major-card h5{font-family:'Noto Naskh Arabic','Libre Baskerville','Times New Roman',serif;}
.chip{display:inline-block;font-size:10.5px;padding:4px 10px;border-radius:999px;margin:2px 5px 2px 0;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.chip.verified{background:rgba(46,133,64,0.13);color:var(--ok);}
.chip.general{background:rgba(154,163,199,0.15);color:var(--text-dim);}
.course-list{margin-top:14px;font-size:12.5px;color:var(--text-dim);line-height:2;}
.course-list .code{color:var(--teal);font-family:'IBM Plex Mono',monospace;font-weight:700;margin-inline-end:6px;}
.checkbox-row{display:flex;align-items:center;gap:9px;padding:5px 0;}
.cred-details{border:1px solid var(--border);border-radius:8px;margin:6px 0;padding:0 12px;background:rgba(154,163,199,0.05);}
.cred-details summary{cursor:pointer;padding:9px 0;font-size:13px;font-weight:600;list-style-position:inside;}
.cred-details summary .cred-title{margin-inline-end:4px;}
.cred-details[open]{padding-bottom:10px;}
.edu-college-block{margin-top:6px;}
.checkbox-row input{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;}
.checkbox-row.done label{color:var(--ok);text-decoration:line-through;opacity:0.7;}
.college-tag{font-size:11px;margin-top:10px;padding:6px 10px;border-radius:var(--r-sm);background:#EDF1FB;color:var(--coral);display:inline-block;font-weight:600;}
.verify-note{font-size:11.5px;color:var(--text-faint);margin-top:10px;font-style:italic;line-height:1.5;}

.careers-for-major{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;}
.careers-for-major .chip{background:#EDF1FB;color:var(--coral-bright);}

.catalog-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.catalog-search{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--border-strong);color:var(--text);
  padding:11px 15px;border-radius:var(--r-md);font-size:13.5px;}
.college-chip{background:var(--panel);border:1px solid var(--border-strong);color:var(--text-dim);font-size:12px;font-weight:600;
  padding:8px 14px;border-radius:var(--r-md);cursor:pointer;white-space:nowrap;}
.college-chip.active{background:var(--coral);color:#FFFFFF;border-color:var(--coral);}
.catalog-count{font-size:12px;color:var(--text-faint);margin-bottom:14px;}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(230px,1fr));gap:10px;}
.catalog-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;}
.catalog-card h6{font-family:'Libre Baskerville','Times New Roman',serif;font-size:14.5px;margin:0 0 8px;font-weight:600;}
[dir="rtl"] .catalog-card h6{font-family:'Noto Naskh Arabic','Libre Baskerville','Times New Roman',serif;}
.catalog-card .row{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;color:var(--text-faint);}
.catalog-card .colleges{display:flex;gap:3px;flex-wrap:wrap;}
.catalog-card .college-dot{width:22px;height:17px;border-radius:4px;font-size:8.5px;display:flex;align-items:center;justify-content:center;
  font-weight:800;background:var(--panel-solid);color:var(--text-dim);border:1px solid var(--border);text-decoration:none;transition:.12s;}
.catalog-card a.college-dot:hover{background:var(--coral);color:#FFFFFF;border-color:var(--coral);}
.college-dot.col-ARC{color:var(--arc);border-color:var(--arc);}
.college-dot.col-SCC{color:var(--scc);border-color:var(--scc);}
.college-dot.col-CRC{color:var(--crc);border-color:var(--crc);}
.college-dot.col-FLC{color:var(--flc);border-color:var(--flc);}
.catalog-card a.college-dot.col-ARC:hover{background:var(--arc);border-color:var(--arc);color:#FFF;}
.catalog-card a.college-dot.col-SCC:hover{background:var(--scc);border-color:var(--scc);color:#FFF;}
.catalog-card a.college-dot.col-CRC:hover{background:var(--crc);border-color:var(--crc);color:#FFF;}
.catalog-card a.college-dot.col-FLC:hover{background:var(--flc);border-color:var(--flc);color:#FFF;}
.edu-college-block{border-inline-start:3px solid var(--border-strong);padding-inline-start:12px;}
.edu-college-block.col-ARC{border-color:var(--arc);}
.edu-college-block.col-SCC{border-color:var(--scc);}
.edu-college-block.col-CRC{border-color:var(--crc);}
.edu-college-block.col-FLC{border-color:var(--flc);}
.catalog-card .ai-pill{font-family:'IBM Plex Mono',monospace;font-weight:700;padding:2px 7px;border-radius:999px;}
.degree-chip{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;
  background:#EDF1FB;color:var(--coral);margin:6px 4px 0 0;}
.degree-chip.na{background:rgba(154,163,199,0.14);color:var(--text-faint);font-style:italic;font-weight:500;}
.degree-approx-note{font-size:9.5px;color:var(--text-faint);font-style:italic;margin-top:4px;display:block;}
.ai-methodology{font-size:11.5px;color:var(--text-faint);line-height:1.6;margin:14px 0 22px;font-style:italic;}

.key-dates{display:flex;flex-direction:column;gap:10px;margin-top:24px;}

.calendar-search-row{display:flex;gap:10px;margin:18px 0 22px;flex-wrap:wrap;}
.calendar-search-row input{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--border-strong);color:var(--text);
  padding:11px 15px;border-radius:var(--r-md);font-size:13.5px;}
.calendar-match-card{background:var(--paper);color:var(--paper-text);border-radius:var(--r-md);padding:18px 20px;margin-bottom:20px;border-inline-start:4px solid var(--gold);}
.calendar-match-card h5{font-family:'Libre Baskerville','Times New Roman',serif;font-size:17px;margin:0 0 8px;}
.calendar-match-card .win-row{font-size:12.5px;color:#3B4356;margin-bottom:4px;}
.calendar-match-card .win-row b{color:#1C2340;}
.calendar-match-card .note{font-size:11.5px;color:#5B6478;font-style:italic;margin-top:8px;}
.calendar-grid-12{display:grid;grid-template-columns:repeat(auto-fill, minmax(190px,1fr));gap:12px;}
.month-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 12px 14px;}
.month-card h6{font-family:'IBM Plex Mono',monospace;font-size:11.5px;text-align:center;margin:0 0 8px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;}
.month-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.month-days .day-cell{aspect-ratio:1;border-radius:3px;font-size:8px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);background:#F3F7FA;position:relative;}
.month-days .day-cell.active{color:#FFFFFF;font-weight:700;}
.month-days .day-cell.dimmed{opacity:0.15;}
.calendar-legend{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 6px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-dim);}
.legend-dot{width:10px;height:10px;border-radius:3px;flex:none;}
.unverified-list{margin-top:20px;display:flex;flex-direction:column;gap:8px;}
.unverified-row{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 15px;font-size:12px;}
.unverified-row b{color:var(--text);}
.unverified-row .u-note{color:var(--text-faint);font-style:italic;display:block;margin-top:3px;}
.key-date-row{display:flex;justify-content:space-between;gap:12px;background:var(--panel);border:1px solid var(--border);padding:13px 16px;border-radius:var(--r-sm);font-size:12.5px;}
.key-date-row b{color:var(--text);}
.key-date-row span{color:var(--text-faint);font-family:'IBM Plex Mono',monospace;font-size:11.5px;}

/* advisor */
.advisor-wrap{display:flex;flex-direction:column;height:540px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.advisor-messages{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:13.5px;line-height:1.55;}
.msg.user{align-self:flex-end;background:var(--coral);color:#FFFFFF;font-weight:600;}
[dir="rtl"] .msg.user{align-self:flex-start;}
.msg.bot{align-self:flex-start;background:#EFF4F9;border:1px solid var(--border);white-space:pre-wrap;}
[dir="rtl"] .msg.bot{align-self:flex-end;}
.msg.bot.loading{color:var(--text-faint);font-style:italic;}
.advisor-input-row{display:flex;gap:8px;padding:14px;border-top:1px solid var(--border);}
.advisor-input-row textarea{flex:1;resize:none;background:#FFFFFF;border:1px solid var(--border-strong);color:var(--text);
  padding:11px 13px;font-family:'Source Sans Pro',sans-serif;font-size:13.5px;border-radius:12px;}
.advisor-input-row button{background:var(--coral-bright);border:none;color:#FFFFFF;font-weight:800;padding:0 22px;border-radius:12px;cursor:pointer;}
.advisor-input-row button:disabled{opacity:.4;cursor:not-allowed;}
.attach-btn{background:var(--panel-2)!important;color:var(--text)!important;font-size:16px;padding:0 14px!important;flex:none;}
.attach-btn:hover{background:var(--panel-solid)!important;}
.attachment-chip{display:inline-flex;align-items:center;gap:8px;background:#EDF1FB;color:var(--coral);
  font-size:12px;padding:7px 12px;border-radius:999px;margin:0 14px 8px;}
.attachment-chip button{background:none;border:none;color:var(--violet);cursor:pointer;font-size:12px;padding:0;}
.attachment-chip-inline{font-size:10.5px;opacity:0.75;margin-top:6px;}
.advisor-empty{color:var(--text-faint);font-size:13px;text-align:center;margin-top:36px;line-height:1.8;}
.advisor-empty b{color:var(--text);}

@media(max-width:640px){
  .major-grid{grid-template-columns:1fr;}
  .dim-preview{grid-template-columns:repeat(2,1fr);}
  .dash-grid{grid-template-columns:1fr;}
  nav{width:100%;}
}

en:["I like it when my work involves constant interaction with people.","I quickly pick up on someone's emotional state and adjust to it.","Helping someone solve a problem is more satisfying to me than solving it alone.","I'm willing to explain the same thing to different people again and again if it actually helps them.","A job where I sit alone all day with no contact with people wears me out.","I find it easy to build trust with people I've just met.","Given the choice, I'd pick a \"people\" job over a \"paperwork/data\" job.",
"I enjoy finding patterns in numbers and data.","I get satisfaction from breaking a complex problem into logical steps.","Tables, reports, and statistics don't scare me — they draw me in.","I like double-checking facts and data rather than assuming \"close enough.\"","I'm curious about automating routine processes through data analysis.","I notice errors in calculations or logic faster than most people around me.","I'd rather spend an evening digging into statistics than making small talk.",
"I like figuring out how technical systems work on the inside.","I'd rather read the manual and take something apart myself than call someone else.","Working with equipment or technology broadly (including computer hardware/systems) appeals to me.","It matters to me to see a physical or technical result from my work.","Configuring systems, software, or equipment is something I could do for hours.","I'd rather fix or set something up myself than pay someone else, if I have the time.","I'm drawn to working with cars, machinery, or computer systems.",
"I like coming up with new ideas and concepts, even if they're hard to apply right away.","I often wonder \"what if\" and \"why is it built this way.\"","Understanding the essence of things matters more to me than just following instructions.","I study topics not because I \"have to,\" but because I'm genuinely curious.","Abstract theories and models fascinate me even without immediate practical use.","I enjoy coming up with unconventional solutions to problems.","Philosophical and worldview questions genuinely interest me.",
"I'm more comfortable when my day has a clear plan and routine.","Unpredictable changes to plans throw me off.","I'd rather know in advance what's expected of me than improvise on the spot.","Clear rules and procedures make my work easier, not more annoying.","I need tasks to be clearly structured, not \"you'll figure it out as you go.\"","I work better in a stable, predictable environment than in constant chaos.","Switching tasks every 20 minutes drains me rather than energizes me.",
"I'm more productive when I'm responsible for the whole process, without constant oversight.","I'm uncomfortable when a decision has to be made as a group rather than on my own.","I'd rather figure out a task myself than ask for help at every step.","Working alone doesn't scare me — it actually gives me freedom.","It matters to me to make decisions without constant sign-off from others.","I get tired of long group discussions faster than I get tired of working solo.","I trust my own conclusions more than the majority opinion.",
"I like taking responsibility for a group's outcome.","I often end up being the person who organizes and directs everyone else.","I'm comfortable making decisions that will affect other people.","I like persuading and leading rather than just carrying out instructions.","Being the \"captain\" of a project appeals to me more than being an executor.","I easily take initiative when I see a process going the wrong way.","It matters to me to see my leadership help a team get results.",
"I notice small inaccuracies that others miss.","It matters to me that everything is done precisely and without errors, even if it's slower.","Checking details and proofreading doesn't tire me — I'm calm about it.","I'm more comfortable working by a strict protocol where every detail matters.","I'd rather redo work than turn it in with a small inaccuracy.","Work that requires meticulousness (documents, data, code, dosages) doesn't scare me.","It's easier for me to spot an error in a system than to see the big picture right away.",
"I like work where I move around rather than sit all day.","Physical activity gives me energy instead of draining it.","I'd choose an on-my-feet job over a desk job.","I enjoy results that take strength, stamina, or dexterity.","Sports or physical training are an important part of my life.","Working outdoors appeals to me more than an office.","I'm comfortable working with my hands and body, not just my head.","It matters to me to create something beautiful or expressive.","I enjoy drawing, music, design, or another form of creativity.","I notice aesthetics around me: colors, shapes, composition.","I like coming up with my own creative ideas and bringing them to life.","Self-expression is a core part of work for me, not a bonus.","I love turning ordinary things into beautiful ones: food, spaces, a look.","Work with no trace of creativity quickly becomes boring to me."],
es:["Me gusta que mi trabajo implique interactuar constantemente con personas.","Capto rápidamente el estado emocional de alguien y me adapto a él.","Ayudar a alguien a resolver un problema me satisface más que resolverlo yo sola.","Estoy dispuesta a explicar lo mismo a distintas personas una y otra vez si de verdad les ayuda.","Un trabajo donde paso todo el día sola sin contacto con gente me agota.","Me resulta fácil generar confianza con personas que acabo de conocer.","Si tuviera que elegir, prefiero un trabajo \"con personas\" antes que uno \"con papeles/datos\".",
"Disfruto encontrando patrones en números y datos.","Me satisface descomponer un problema complejo en pasos lógicos.","Las tablas, informes y estadísticas no me asustan — me atraen.","Prefiero verificar hechos y datos en vez de asumir que \"así está bien\".","Me interesa automatizar procesos rutinarios mediante análisis de datos.","Detecto errores de cálculo o de lógica más rápido que la mayoría.","Prefiero pasar una tarde analizando estadísticas que charlando de cosas sin importancia.",
"Me gusta entender cómo funcionan los sistemas técnicos por dentro.","Prefiero leer el manual y desarmar algo yo misma antes que llamar a otra persona.","Trabajar con equipos o tecnología en un sentido amplio (incluyendo hardware o sistemas informáticos) me atrae.","Me importa ver un resultado físico o técnico de mi trabajo.","Configurar sistemas, programas o equipos es algo que podría hacer durante horas.","Prefiero arreglar o configurar algo yo misma antes que pagarle a alguien, si tengo tiempo.","Me atrae trabajar con autos, maquinaria o sistemas informáticos.",
"Me gusta generar ideas y conceptos nuevos, aunque sean difíciles de aplicar de inmediato.","Frecuentemente me pregunto \"¿y si...?\" y \"¿por qué está construido así?\".","Entender la esencia de las cosas me importa más que simplemente seguir instrucciones.","Estudio temas no porque \"tenga que\", sino porque genuinamente me interesan.","Las teorías y modelos abstractos me fascinan aunque no tengan uso práctico inmediato.","Disfruto encontrando soluciones poco convencionales a los problemas.","Las preguntas filosóficas y existenciales me interesan de verdad.",
"Me siento más cómoda cuando mi día tiene un plan y una rutina claros.","Los cambios de planes impredecibles me desestabilizan.","Prefiero saber de antemano qué se espera de mí, en vez de improvisar sobre la marcha.","Las reglas y procedimientos claros facilitan mi trabajo, no me molestan.","Necesito que las tareas estén bien estructuradas, no \"ya lo irás descubriendo\".","Trabajo mejor en un entorno estable y predecible que en un caos constante.","Cambiar de tarea cada 20 minutos me agota más de lo que me energiza.",
"Soy más productiva cuando soy responsable de todo el proceso, sin supervisión constante.","Me incomoda cuando una decisión debe tomarse en grupo en vez de por mi cuenta.","Prefiero resolver una tarea yo misma antes que pedir ayuda en cada paso.","Trabajar sola no me asusta — al contrario, me da libertad.","Me importa poder tomar decisiones sin necesitar aprobación constante.","Me canso más rápido de las discusiones grupales largas que del trabajo en solitario.","Confío más en mis propias conclusiones que en la opinión de la mayoría.",
"Me gusta asumir la responsabilidad por el resultado de un grupo.","Frecuentemente termino siendo quien organiza y dirige a los demás.","Me siento cómoda tomando decisiones que afectarán a otras personas.","Me gusta persuadir y liderar, no solo ejecutar instrucciones.","El rol de \"capitana\" en un proyecto me atrae más que el de ejecutora.","Tomo la iniciativa fácilmente cuando veo que un proceso va por mal camino.","Me importa ver cómo mi liderazgo ayuda a un equipo a lograr resultados.",
"Noto pequeñas imprecisiones que otros pasan por alto.","Me importa que todo se haga con precisión y sin errores, aunque sea más lento.","Revisar detalles y corregir no me cansa — lo llevo con calma.","Me siento más cómoda trabajando con un protocolo estricto donde cada detalle importa.","Prefiero rehacer un trabajo antes que entregarlo con una pequeña imprecisión.","Un trabajo que exige minuciosidad (documentos, datos, código, dosis) no me asusta.","Me resulta más fácil detectar un error en un sistema que ver el panorama general de inmediato.",
"Me gusta un trabajo donde me muevo, no donde estoy sentada todo el día.","La actividad física me da energía en lugar de quitármela.","Prefiero un trabajo de pie a un trabajo de escritorio.","Disfruto los resultados que requieren fuerza, resistencia o destreza.","El deporte o el entrenamiento físico son una parte importante de mi vida.","Trabajar al aire libre me atrae más que una oficina.","Me siento cómoda trabajando con mis manos y mi cuerpo, no solo con la cabeza.","Me importa crear algo bello o expresivo.","Disfruto dibujar, la música, el diseño u otra forma de creatividad.","Noto la estética a mi alrededor: colores, formas, composición.","Me gusta idear y realizar mis propias ideas creativas.","La autoexpresión es parte esencial del trabajo para mí, no un extra.","Me encanta convertir cosas comunes en algo bello: comida, espacios, un look.","Un trabajo sin nada de creatividad me aburre rápidamente."],
ar:["يعجبني أن يتضمن عملي تواصلاً مستمراً مع الناس.","ألاحظ بسرعة الحالة العاطفية للشخص وأتكيف معها.","مساعدة شخص ما على حل مشكلته تمنحني رضا أكبر من حلها بمفردي.","أنا مستعدة لشرح الشيء نفسه لأشخاص مختلفين مراراً إذا كان ذلك يفيدهم فعلاً.","العمل الذي أجلس فيه وحدي طوال اليوم دون تواصل مع الناس يرهقني.","من السهل علي بناء الثقة مع أشخاص جدد.","عند التساوي، أفضل وظيفة «مع الناس» على وظيفة «مع الأوراق/البيانات».",
"أستمتع بإيجاد الأنماط في الأرقام والبيانات.","أشعر بالرضا عند تقسيم مشكلة معقدة إلى خطوات منطقية.","الجداول والتقارير والإحصاءات لا تخيفني — بل تجذبني.","أفضل التحقق من الحقائق والبيانات بدلاً من افتراض أن الأمر «جيد بما يكفي».","يثير اهتمامي أتمتة العمليات الروتينية عبر تحليل البيانات.","ألاحظ الأخطاء في الحسابات أو المنطق أسرع من معظم من حولي.","أفضل قضاء أمسية في تحليل الإحصاءات على حديث عابر بلا معنى.",
"يعجبني فهم كيفية عمل الأنظمة التقنية من الداخل.","أفضل قراءة الدليل وتفكيك شيء ما بنفسي على الاستعانة بشخص آخر.","العمل مع المعدات أو التقنية بمعناها الواسع (بما في ذلك أجهزة وأنظمة الحاسوب) يجذبني.","من المهم لي أن أرى نتيجة مادية أو تقنية لعملي.","إعداد الأنظمة والبرامج والمعدات هو شيء يمكنني القيام به لساعات.","أفضل إصلاح أو ضبط شيء بنفسي على دفع المال لشخص آخر إن كان لدي الوقت.","ينجذب اهتمامي للعمل مع السيارات أو الآلات أو أنظمة الحاسوب.",
"يعجبني ابتكار أفكار ومفاهيم جديدة حتى لو كان تطبيقها صعباً في الحال.","كثيراً ما أتساءل «ماذا لو» و«لماذا بُني الأمر على هذا النحو».","فهم جوهر الأشياء أهم بالنسبة لي من مجرد اتباع التعليمات.","أدرس مواضيع ليس لأنني «مضطرة» بل لأنني مهتمة فعلاً.","النظريات والنماذج المجردة تسحرني حتى دون فائدة عملية فورية.","أستمتع بابتكار حلول غير تقليدية للمشكلات.","الأسئلة الفلسفية والوجودية تثير اهتمامي الحقيقي.",
"أشعر براحة أكبر عندما يكون ليومي خطة وروتين واضحان.","التغييرات غير المتوقعة في الخطط تربكني.","أفضل معرفة ما هو متوقع مني مسبقاً على الارتجال في اللحظة.","القواعد والإجراءات الواضحة تسهّل عملي ولا تزعجني.","أحتاج أن تكون المهام منظمة بوضوح، لا أن «أكتشف الأمر أثناء العمل».","أعمل بشكل أفضل في بيئة مستقرة ويمكن التنبؤ بها من الفوضى المستمرة.","تبديل المهام كل 20 دقيقة يستنزفني أكثر مما ينشطني.",
"أكون أكثر إنتاجية عندما أكون مسؤولة عن العملية بأكملها دون رقابة مستمرة.","أشعر بعدم الارتياح عندما يجب اتخاذ قرار جماعياً بدلاً من بمفردي.","أفضل حل المهمة بنفسي على طلب المساعدة في كل خطوة.","العمل بمفردي لا يخيفني — بل يمنحني الحرية.","من المهم لي اتخاذ القرارات دون موافقة مستمرة من الآخرين.","أتعب من النقاشات الجماعية الطويلة أسرع من تعبي من العمل الفردي.","أثق باستنتاجاتي أكثر من ثقتي برأي الأغلبية.",
"يعجبني تحمل المسؤولية عن نتيجة المجموعة.","غالباً ما أكون الشخص الذي ينظم ويوجه الآخرين.","أشعر بالارتياح عند اتخاذ قرارات ستؤثر على أشخاص آخرين.","يعجبني الإقناع والقيادة أكثر من مجرد تنفيذ التعليمات.","دور «القائدة» في مشروع يجذبني أكثر من دور المنفذة.","أبادر بسهولة عندما أرى أن العملية تسير في الاتجاه الخاطئ.","من المهم لي أن أرى كيف تساعد قيادتي الفريق على تحقيق النتائج.",
"ألاحظ الأخطاء الصغيرة التي يغفل عنها الآخرون.","من المهم لي أن يتم كل شيء بدقة ودون أخطاء حتى لو استغرق وقتاً أطول.","مراجعة التفاصيل والتدقيق لا يرهقني — أتعامل معه بهدوء.","أشعر بارتياح أكبر في العمل وفق بروتوكول صارم حيث كل تفصيل مهم.","أفضل إعادة العمل على تسليمه بخلل بسيط.","العمل الذي يتطلب الدقة (المستندات، البيانات، الشيفرة، الجرعات) لا يخيفني.","من الأسهل علي ملاحظة خطأ في نظام ما من رؤية الصورة الكاملة فوراً.",
"يعجبني عمل أتحرك فيه بدلاً من الجلوس طوال اليوم.","النشاط البدني يمنحني الطاقة بدلاً من أن يستنزفها.","أفضل عملاً أكون فيه واقفة ومتحركة على عمل مكتبي.","أستمتع بالنتائج التي تتطلب قوة أو تحملاً أو مهارة حركية.","الرياضة أو التمارين البدنية جزء مهم من حياتي.","العمل في الهواء الطلق يجذبني أكثر من المكتب.","أشعر بالراحة في العمل بيديّ وجسدي، لا بعقلي فقط.","من المهم لي أن أبدع شيئاً جميلاً أو معبّراً.","أستمتع بالرسم أو الموسيقى أو التصميم أو أي شكل آخر من الإبداع.","ألاحظ الجماليات من حولي: الألوان والأشكال والتكوين.","يعجبني ابتكار أفكاري الإبداعية الخاصة وتحقيقها.","التعبير عن الذات جزء أساسي من العمل بالنسبة لي، وليس إضافة.","أحب تحويل الأشياء العادية إلى جميلة: الطعام، المساحات، المظهر.","العمل الخالي من أي لمسة إبداعية يصيبني بالملل بسرعة."],
fa:["دوست دارم کارم شامل ارتباط مداوم با مردم باشد.","سریع حالت احساسی افراد را متوجه می‌شوم و خودم را با آن تطبیق می‌دهم.","کمک به کسی برای حل مشکلش برایم رضایت‌بخش‌تر از حل تنهایی آن است.","حاضرم یک موضوع را بارها برای افراد مختلف توضیح دهم اگر واقعاً به آن‌ها کمک کند.","کاری که تمام روز تنها بدون تماس با مردم باشم خسته‌ام می‌کند.","برایم آسان است که با افراد تازه‌آشنا اعتماد ایجاد کنم.","اگر مساوی باشد، شغل «با مردم» را به شغل «با کاغذبازی/داده» ترجیح می‌دهم.",
"از پیدا کردن الگو در اعداد و داده‌ها لذت می‌برم.","تجزیه یک مسئله پیچیده به مراحل منطقی برایم رضایت‌بخش است.","جدول‌ها، گزارش‌ها و آمار مرا نمی‌ترسانند، بلکه جذبم می‌کنند.","ترجیح می‌دهم داده‌ها را بررسی کنم تا اینکه فرض کنم «تقریباً درست است».","به خودکارسازی فرآیندهای روتین از طریق تحلیل داده علاقه دارم.","اشتباهات محاسباتی یا منطقی را سریع‌تر از بیشتر افراد اطرافم متوجه می‌شوم.","ترجیح می‌دهم عصر را با بررسی آمار بگذرانم تا گفتگوی بی‌هدف.",
"دوست دارم بفهمم سیستم‌های فنی از درون چگونه کار می‌کنند.","ترجیح می‌دهم دفترچه راهنما را بخوانم و خودم چیزی را جدا کنم تا اینکه کس دیگری را صدا بزنم.","کار با تجهیزات یا فناوری به معنای گسترده (شامل سخت‌افزار و سیستم‌های کامپیوتری) برایم جذاب است.","برایم مهم است که نتیجه فیزیکی یا فنی کارم را ببینم.","تنظیم سیستم‌ها، نرم‌افزارها یا تجهیزات کاری است که می‌توانم ساعت‌ها انجام دهم.","ترجیح می‌دهم خودم چیزی را تعمیر یا تنظیم کنم تا به کس دیگری پول بدهم، اگر وقت داشته باشم.","کار با خودرو، ماشین‌آلات یا سیستم‌های کامپیوتری برایم جذاب است.",
"دوست دارم ایده‌ها و مفاهیم جدید بسازم، حتی اگر اجرای فوری آن‌ها سخت باشد.","اغلب از خودم می‌پرسم «اگر... چه می‌شد» و «چرا اینطور ساخته شده».","فهمیدن ماهیت واقعی چیزها برایم مهم‌تر از صرفاً پیروی از دستورالعمل است.","موضوعاتی را مطالعه می‌کنم نه چون «باید»، بلکه چون واقعاً برایم جالب است.","نظریه‌ها و مدل‌های انتزاعی حتی بدون کاربرد عملی فوری مرا مجذوب می‌کنند.","از یافتن راه‌حل‌های غیرمتعارف برای مشکلات لذت می‌برم.","سؤالات فلسفی و مربوط به جهان‌بینی واقعاً برایم جالب‌اند.",
"وقتی روزم برنامه و روال مشخصی دارد راحت‌ترم.","تغییرات غیرمنتظره در برنامه‌ها مرا از تعادل خارج می‌کند.","ترجیح می‌دهم از قبل بدانم چه انتظاری از من می‌رود تا اینکه فی‌البداهه عمل کنم.","قوانین و رویه‌های روشن کارم را آسان‌تر می‌کنند، نه آزاردهنده.","لازم دارم وظایف به‌وضوح ساختاریافته باشند، نه اینکه «در حین کار بفهمم».","در محیط پایدار و قابل‌پیش‌بینی بهتر از هرج‌ومرج مداوم کار می‌کنم.","تغییر وظیفه هر ۲۰ دقیقه بیشتر خسته‌ام می‌کند تا اینکه انرژی بدهد.",
"وقتی مسئول کل فرآیند هستم بدون نظارت مداوم، بازده‌ام بیشتر است.","وقتی تصمیمی باید جمعی گرفته شود نه به‌تنهایی، احساس ناراحتی می‌کنم.","ترجیح می‌دهم خودم مسئله را حل کنم تا اینکه در هر قدم کمک بخواهم.","کار کردن تنها مرا نمی‌ترساند، بلکه آزادی می‌دهد.","برایم مهم است بتوانم بدون تأیید مداوم دیگران تصمیم بگیرم.","از بحث‌های گروهی طولانی زودتر از کار انفرادی خسته می‌شوم.","به نتیجه‌گیری‌های خودم بیشتر از نظر اکثریت اعتماد دارم.",
"دوست دارم مسئولیت نتیجه‌ی یک گروه را بر عهده بگیرم.","اغلب من کسی هستم که دیگران را سازمان‌دهی و هدایت می‌کند.","در تصمیم‌گیری‌هایی که بر دیگران تأثیر می‌گذارد راحت هستم.","متقاعد کردن و رهبری کردن را به صرفاً اجرای دستورات ترجیح می‌دهم.","نقش «کاپیتان» در یک پروژه برایم جذاب‌تر از نقش مجری است.","وقتی می‌بینم روندی اشتباه پیش می‌رود، به‌راحتی ابتکار عمل به دست می‌گیرم.","برایم مهم است ببینم رهبری‌ام چگونه به تیم در رسیدن به نتیجه کمک می‌کند.",

/* Build a direct link to a program's page on a college site, opening the
   "Degrees and Certificates" tab (?tab=2). Pattern verified by user:
   https://flc.losrios.edu/academics/programs-majors/administration-of-justice?tab=2
   Slugs are generated from the program name; a few unusual names may not
   match the college's actual slug — those will 404 and can be hand-fixed. */
function programSlug(name){
  return name
    .toLowerCase()
    .replace(/\(.*?\)/g, "")        // drop parenthetical parts: "(ESL)", "(CNC)"
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, "-")     // slashes, commas, spaces -> hyphen
    .replace(/^-+|-+$/g, "");
}
const SLUG_OVERRIDES = { "public-health":"health-education" };
function programURL(collegeCode, programName){
  let slug = programSlug(programName);
  if(SLUG_OVERRIDES[slug]) slug = SLUG_OVERRIDES[slug];
  return `https://${collegeCode.toLowerCase()}.losrios.edu/academics/programs-majors/${slug}?tab=2`;
}

function collegeCodesFromField(str){
  if(str==="all4") return ["ARC","SCC","CRC","FLC"];
  return str.split("/").map(s=>s.trim()).filter(Boolean);
}

/* Compact plain-text summary of the results — kept short so it survives
   mailto: URL length limits in desktop mail clients (~1500 chars). */
function buildResultsSummary(){
  if(!state.results) return "";
  const {scores, matches} = state.results;
  const L = emT();
  const lines = [];
  lines.push("Compass — Los Rios career & education navigator");
  lines.push(L.testDate + ": " + (state.lastTestDate ? state.lastTestDate.slice(0,10) : new Date().toISOString().slice(0,10)));
  if(state.goal) lines.push(gt().tag + ": " + gt().goalChip[state.goal]);
  lines.push("");
  lines.push(L.traits + ": " + topDims(scores,3).map(d=>tf(DIMENSIONS[d])+" ("+scores[d].toFixed(1)+"/5)").join(", "));
  lines.push("");
  lines.push(L.matches + ":");
  matches.slice(0,5).forEach((c,i)=>{
    let line = (i+1) + ". " + tf(c.t).name + " — " + c.pct + "% (" + (COLLEGE_NAMES[c.college]||c.college) + ")";
    const rec = recommendPath(c, state.goal);
    if(rec && rec.cred) line += "\n   " + L.forGoal + ": " + rec.cred.title + ((rec.cred.units!==undefined&&rec.cred.units!==null) ? " · " + rec.cred.units + " " + eduT().unitsLabel : "") + " · " + rec.site.college;
    lines.push(line);
  });
  lines.push("");
  lines.push(L.details + ": " + location.href.split("#")[0].split("?")[0]);
  lines.push(L.verify);
  return lines.join("\n");
}

/* Career prog name -> page name on the college sites, where they differ */
const PROG_PAGE_ALIASES = {"Public Health":"Health Education"};

/* Pick the credential that fits the student's goal for a career's
   program, from the scraped PROGRAM_REQUIREMENTS data. Prefers the
   career's own college(s); falls back to the closest published
   credential (flagged) so we never invent one. */
function recommendPath(career, goal){
  if(typeof PROGRAM_REQUIREMENTS==="undefined" || !goal) return null;
  const target = PROG_PAGE_ALIASES[career.prog] || career.prog;
  /* exact page-name match wins; substring match ("Nursing" ->
     "Nursing and Allied Health") is only a fallback so that e.g.
     "Business" never resolves to "Agriculture Business" */
  let entries = eduIndex().filter(e=> e.name===target);
  if(!entries.length) entries = eduIndex().filter(e=> e.name.toLowerCase().includes(target.toLowerCase()));
  if(!entries.length) return {none:true};
  const prefCols = career.college==="all4" ? [] : collegeCodesFromField(career.college||"");
  const sites=[];
  entries.forEach(e=> e.sites.forEach(s=> sites.push({...s, progName:e.name})));
  sites.sort((a,b)=> (prefCols.includes(a.college)?0:1) - (prefCols.includes(b.college)?0:1));
  if(goal==="classes") return {classes:true, site:sites[0]};
  const want =
    goal==="transfer"    ? (c)=> c.type && c.type.indexOf("-T")>=0
    : goal==="degree"    ? (c)=> c.type==="AA"||c.type==="AS"||c.type==="AA/AS"
    : /* certificate */    (c)=> c.type==="Certificate";
  for(const s of sites){ const c=(s.credentials||[]).find(want); if(c) return {cred:c, site:s}; }
  for(const s of sites){ if(s.credentials && s.credentials.length) return {cred:s.credentials[0], site:s, fallback:true}; }
  return {none:true};
}

/* Merged view of PROGRAM_REQUIREMENTS (data.js): program name ->
   per-college entries. Programs whose pages list no degrees or
   certificates (course-only/administrative pages) are hidden here —
   they are still recorded in PROGRAM_REQUIREMENTS.failures or with
   empty credentials for honesty. */
let EDU_INDEX_CACHE = null;
function eduIndex(){
  if(EDU_INDEX_CACHE) return EDU_INDEX_CACHE;
  const map = new Map();
  if(typeof PROGRAM_REQUIREMENTS !== "undefined"){
    Object.entries(PROGRAM_REQUIREMENTS.colleges).forEach(([col, cd])=>{
      cd.programs.forEach(p=>{
        if(!p.credentials || !p.credentials.length) return;
        if(!map.has(p.name)) map.set(p.name, []);
        map.get(p.name).push({college: col, url: p.url, credentials: p.credentials});
      });
    });
  }
  EDU_INDEX_CACHE = [...map.entries()]
    .map(([name, sites])=>({name, sites}))
    .sort((a,b)=>a.name.localeCompare(b.name));
  return EDU_INDEX_CACHE;
}

/* Sandboxed environments (like the Claude artifact viewer) often block
   opening external links. Try to open; if blocked, copy the URL to the
   clipboard and tell the user, instead of failing silently. */
function openExternal(url){
  let opened = null;
  try { opened = window.open(url, "_blank", "noopener,noreferrer"); } catch(e){ opened = null; }
  if(!opened){
    const fallback = ()=>{
      try{
        const ta = document.createElement("textarea");
        ta.value = url; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
        showToast(t().linkCopied);
      }catch(e){ showToast(url); }
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(()=>showToast(t().linkCopied)).catch(fallback);
    } else { fallback(); }
  }
}
let toastTimer = null;
function showToast(msg){
  let el = document.getElementById("appToast");
  if(!el){
    el = document.createElement("div");
    el.id = "appToast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 3500);
}

function collegeLinksHTML(str, progName){
  return collegeCodesFromField(str).map(code=>{
    const u = progName ? programURL(code, progName) : COLLEGE_LINKS[code];
    return `<a href="${u}" class="college-link" data-ext="${u}">${code}</a>`;
  }).join(" ");
}

/* Global click interceptor for all external links */
document.addEventListener("click", (e)=>{
  const a = e.target.closest("a[data-ext]");
  if(a){
    e.preventDefault();
    openExternal(a.getAttribute("data-ext"));
  }
}, true);

      state = {...state, ...saved, screen: saved.results ? "dash" : "dash", advisorMessages: saved.advisorMessages||[], advisorLoading:false};
    }
  }catch(e){ /* no saved state yet */ }
  state.loaded = true;
  render();
}
let saveTimer=null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const slimMessages = state.advisorMessages.map(m=>{
        if(Array.isArray(m.content)){
          const tb = m.content.find(b=>b.type==="text");
          return {role:m.role, content: tb ? tb.text : "", attachmentName: m.attachmentName};
        }
        return m;
      });
      const toSave = {lang:state.lang, goal:state.goal, apiKey:state.apiKey, answers:state.answers, results:state.results, lastTestDate:state.lastTestDate, checklist:state.checklist, advisorMessages:slimMessages};
      await window.storage.set("compass_state", JSON.stringify(toSave));
    }catch(e){}
  }, 400);
}

function t(){ return UI[state.lang]; }
function isRTL(){ return !!RTL[state.lang]; }
function tf(obj){ return obj[state.lang] || obj.en || obj.ru; }

/* ============================================================
   SCORING
   ============================================================ */
function computeResults(){
  const sums={}, counts={};
  DIM_KEYS.forEach(d=>{sums[d]=0;counts[d]=0;});
  Q_DIMS.forEach((d,i)=>{ const v=state.answers[i]; if(v!=null){ sums[d]+=v; counts[d]++; } });
  const scores={};
  DIM_KEYS.forEach(d=> scores[d] = counts[d] ? sums[d]/counts[d] : 3);

  /* Profile-SHAPE matching (centered Pearson correlation), not raw
     Euclidean distance. Students cluster around 3-4 on the answer
     scale, so with raw distance the careers with mid-range profiles
     (generalists) sat closest to almost everyone and kept winning,
     while sharply-profiled careers (Welder, EMT, Paralegal...) never
     surfaced. Correlating CENTERED vectors matches what stands out
     for this student relative to their own average against what
     stands out for the career — acquiescence bias (answering high
     on everything) cancels out. Euclidean distance stays as the
     tie-breaker only. */
  const uVals = DIM_KEYS.map(d=>scores[d]||3);
  const uMean = uVals.reduce((a,b)=>a+b,0)/uVals.length;
  const matches = CAREERS.map(c=>{
    const cVals = DIM_KEYS.map(d=>c.dims[d]);
    const cMean = cVals.reduce((a,b)=>a+b,0)/cVals.length;
    let num=0, du=0, dc=0, sq=0;
    DIM_KEYS.forEach((d,i)=>{
      const a=uVals[i]-uMean, b=cVals[i]-cMean;
      num+=a*b; du+=a*a; dc+=b*b;
      const diff=uVals[i]-cVals[i]; sq+=diff*diff;
    });
    const r = (du>1e-9 && dc>1e-9) ? num/Math.sqrt(du*dc) : 0;
    const pct = Math.max(0, Math.min(100, Math.round(50+50*r)));
    return {...c, pct, _dist:Math.sqrt(sq)};
  }).sort((a,b)=> b.pct-a.pct || a._dist-b._dist);

  state.results={scores, matches};
  state.lastTestDate = new Date().toISOString();
  persist();
}
function topDims(scores,n){ return Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,n).map(e=>e[0]); }
function whyFit(career, scores){
  const userTop=topDims(scores,3);
  const careerTop=Object.entries(career.dims).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  const overlap=userTop.filter(d=>careerTop.includes(d));
  const dl = DIMENSIONS;
  if(overlap.length===0) return null;
  return overlap.map(d=>tf(dl[d])).join(", ");
}
function monthsSince(iso){
  if(!iso) return 999;
  const d=new Date(iso);
  return (Date.now()-d.getTime())/(1000*60*60*24*30);
}

}

function radarSVG(scores){
  const dims=DIM_KEYS; const n=dims.length; const cx=150, cy=150, R=105;
  const pts=dims.map((d,i)=>{ const a=(Math.PI*2*i/n)-Math.PI/2; const r=R*((scores[d]||3)/5); return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; });
  const ring=(f)=>dims.map((d,i)=>{ const a=(Math.PI*2*i/n)-Math.PI/2; return [cx+R*f*Math.cos(a), cy+R*f*Math.sin(a)]; }).map(p=>p.join(",")).join(" ");
  const poly=pts.map(p=>p.join(",")).join(" ");
  const labels=dims.map((d,i)=>{ const a=(Math.PI*2*i/n)-Math.PI/2; const lr=R+28; const x=cx+lr*Math.cos(a), y=cy+lr*Math.sin(a);
    return `<text x="${x}" y="${y}" font-size="10" fill="#3E556B" text-anchor="middle" font-family="IBM Plex Mono, monospace">${tf(DIMENSIONS[d])}</text>`; }).join("");
  return `<svg width="300" height="300" viewBox="0 0 300 300">
    <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#252D65" stop-opacity="0.30"/><stop offset="100%" stop-color="#215DD6" stop-opacity="0.30"/></linearGradient></defs>
    <polygon points="${ring(1)}" fill="none" stroke="rgba(20,41,61,0.15)" stroke-width="1"/>
    <polygon points="${ring(0.66)}" fill="none" stroke="rgba(20,41,61,0.15)" stroke-width="1"/>
    <polygon points="${ring(0.33)}" fill="none" stroke="rgba(20,41,61,0.15)" stroke-width="1"/>
    <polygon points="${poly}" fill="url(#rg)" stroke="#252D65" stroke-width="2"/>
    ${labels}</svg>`;
}

  function credentialHTML(cred){
    const unitsChip = (cred.units!==undefined && cred.units!==null) ? `<span class="degree-chip">${cred.units} ${eduT().unitsLabel}</span>` : "";
    const typeChip = cred.type ? `<span class="degree-chip">${cred.type}</span>` : "";
    let rows;
    if(cred.courses && cred.courses.length){
      rows = cred.courses.map(c=>{

          const block=document.createElement("div");
          block.className="edu-college-block col-"+site.college;
          block.innerHTML=`<div class="college-tag" style="margin:10px 0 4px;"><b>${COLLEGE_NAMES[site.college]||site.college}</b> · <a href="${site.url}" data-ext="${site.url}" class="college-link">${eduT().source}</a></div>`
            + site.credentials.map(credentialHTML).join("");
          body.appendChild(block);
        });
        const linkedCareers = CAREERS.filter(c=>c.prog===p.name);
        if(linkedCareers.length){
          const cfm = document.createElement("div");
          cfm.className="careers-for-major";
          cfm.innerHTML = `<div style="width:100%;font-size:11.5px;color:var(--text-faint);margin:8px 0 4px;">${t().careersForMajor}</div>` +
            linkedCareers.map(c=>`<span class="chip careers-for-major">${tf(c.t).name}</span>`).join("");
          body.appendChild(cfm);
        }
        card.appendChild(body);
      }
      grid.appendChild(card);
    });
  }
  setTimeout(renderEduGrid, 0);
  return el;
}

function renderCatalog(){
  const el=document.createElement("div");
  el.innerHTML=`
    <div class="eyebrow">${t().navCatalog}</div>
    <h2 class="title" style="font-size:27px;">${t().catalogTitle}</h2>
    <p class="lede">${t().catalogLede}</p>
    <p class="ai-methodology">${t().aiMethodNote}</p>
    <p class="ai-methodology">${t().degreeLegend}</p>
    <div class="catalog-toolbar" id="catalogToolbar"></div>
    <div class="catalog-count" id="catalogCount"></div>
    <div class="catalog-grid" id="catalogGrid"></div>
  `;
  const toolbar = el.querySelector("#catalogToolbar");
  const searchInput = document.createElement("input");
  searchInput.className="catalog-search";
  searchInput.placeholder=t().catalogSearch;
  searchInput.value=state.catalogSearch;
  searchInput.oninput=(e)=>{ state.catalogSearch=e.target.value; renderCatalogGrid(); };
  toolbar.appendChild(searchInput);
  ["all","ARC","SCC","CRC","FLC"].forEach(c=>{
    const chip=document.createElement("button");
    chip.className="college-chip"+(state.catalogCollege===c?" active":"");
    chip.textContent = c==="all" ? t().catalogAllColleges : (COLLEGE_NAMES[c]||c);
    chip.onclick=()=>{ state.catalogCollege=c; render(); };
    toolbar.appendChild(chip);
  });

  function renderCatalogGrid(){
    const grid = document.getElementById("catalogGrid");
    const countEl = document.getElementById("catalogCount");
    if(!grid) return;
    const q = state.catalogSearch.trim().toLowerCase();
    const filtered = ALL_PROGRAMS.filter(p=>{
      const matchesSearch = !q || p.name.toLowerCase().includes(q);
      const matchesCollege = state.catalogCollege==="all" || p.colleges.includes(state.catalogCollege);
      return matchesSearch && matchesCollege;
    });
    countEl.textContent = t().catalogCount(filtered.length);
    grid.innerHTML="";
    filtered.forEach(p=>{
      const card=document.createElement("div");
      card.className="catalog-card";
      const aiColor = p.ai>=4 ? "#2E8540" : p.ai===3 ? "#B8860B" : "#C62828";
      let degreeHtml;
      if(p.degreeTypes===null){
        degreeHtml = `<span class="degree-chip na">${t().degreeUnknown}</span>`;
      } else if(p.degreeTypes.length===0){
        degreeHtml = `<span class="degree-chip na">${t().degreeNone}</span>`;
      } else {
        degreeHtml = p.degreeTypes.map(d=>`<span class="degree-chip">${d}</span>`).join("") +
          (p.degreeApprox ? `<span class="degree-approx-note">${t().degreeApprox}</span>` : "");
      }
      card.innerHTML=`
        <h6>${p.name}</h6>
        <div class="row">
          <div class="colleges">${p.colleges.map(c=>{const u=programURL(c, p.name);return `<a class="college-dot col-${c}" href="${u}" data-ext="${u}" title="${p.name} — ${COLLEGE_NAMES[c]||c}">${c}</a>`;}).join("")}</div>
          <span class="ai-pill" style="background:${aiColor}22;color:${aiColor};">AI ${p.ai}/5</span>
        </div>
        <div>${degreeHtml}</div>
      `;
      grid.appendChild(card);
    });
  }
  setTimeout(renderCatalogGrid, 0);
  return el;
}

function buildAdvisorSystemPrompt(){
  const langName = LANG_NAMES[state.lang];
  let ctx = `You are an AI education & career advisor for students at the Los Rios Community College District (American River College, Sacramento City College, Cosumnes River College, Folsom Lake College) in California. Respond in ${langName} (the student's chosen app language) unless they write in a different language, in which case follow their language. Be concrete and practical, no fluff or generic motivational language. If unsure about a current requirement, say so honestly and suggest checking assist.org or a counselor — never invent numbers. Note: Los Rios is mid-transition to a new statewide Common Course Numbering (CCN) system as of Fall 2026, so some course numbers are actively changing.

The student can attach a transcript, unofficial transcript screenshot, or a photo/PDF of their completed course list. When they do:
- Read every course, grade, and unit value you can see in the image/document.
- California community college Associate degrees generally require a minimum of 60 semester units (mix of major/GE/elective, varies by degree — this is a general baseline, not exact per program).
- Certificates vary widely in unit count (often 12-30+ units) — do not assume 60 units applies to certificates.
- Add up the units you can clearly read, tell the student your running total, and say clearly which courses you weren't able to read confidently (image quality, cropped, handwriting) rather than guessing at unclear ones.
- Estimate roughly how many units/credits likely remain toward an AA/AS (or the specific major discussed), but ALWAYS caveat that this is your own estimate from an unofficial document, not a substitute for an official Degree Audit / counselor evaluation, since general education patterns and specific major requirements affect the real number.
- If a course name/number looks like it's already been renamed under the CCN transition, mention that too.

AI-RESILIENCE COACHING — a core part of your job is helping the student become an AI-resilient professional:
- Recommend skill STACKS, not single skills: pair a hands-on / licensed / human-facing core (patient care, skilled trades, teaching, emergency response) with data & AI literacy. Combinations are much harder to automate than either part alone.
- Push AI-tool fluency inside their own field: learning to direct, verify, and apply AI tools (writing effective prompts, checking outputs for errors, using the domain's software) — professionals who supervise AI outcompete those who compete against it.
- Point out the durable human components of any career they ask about: physical work in unpredictable environments, real-time judgment with safety or legal liability, licensure and regulatory gatekeeping, and trust/relationship work.
- Be honest where routine exposure is high (data entry, routine bookkeeping, template writing, records processing) and suggest adjacent, more resilient specializations reachable from the same Los Rios major (e.g. accounting -> forensic accounting or advisory; writing -> editing, verification, communications strategy; office admin -> compliance or HR with people-facing duties).
- Suggest concrete Los Rios moves: a certificate that adds an applied or tech layer to their major, Work Experience (internship) courses, and always verifying the plan with a counselor.
- The app's AI-resilience ratings (1-5) are directional estimates cross-checked in July 2026 against the U.S. Department of Labor's O*NET \"Degree of Automation\" data — treat them as guidance, not certified fact, and say so if asked.`;
  if(state.results){
    const {scores, matches}=state.results;
    const topD=topDims(scores,3).map(d=>tf(DIMENSIONS[d])).join(", ");
    const topC=matches.slice(0,3).map(c=>tf(c.t).name).join(", ");
    ctx += ` Student's test profile — strongest traits: ${topD}. Top career matches: ${topC}.`;
  }
  if(state.goal){
    const goalNames={classes:"take just a class or two for a specific skill", certificate:"earn a short job-focused certificate", degree:"complete a full associate degree (A.A./A.S.)", transfer:"transfer to a UC/CSU university for a bachelor's"};
    ctx += ` Student's stated educational goal: ${goalNames[state.goal]||state.goal}. Tailor course and credential advice to that goal.`;
  }
  if(typeof PROGRAM_REQUIREMENTS !== "undefined"){
    const nProg = Object.values(PROGRAM_REQUIREMENTS.colleges).reduce((s,c)=>s+c.programs.length,0);
    ctx += ` Reference: the app's Education tab contains a snapshot (${PROGRAM_REQUIREMENTS.generated_at.slice(0,10)}) of degree/certificate requirements scraped from ${nProg} official Los Rios program pages across ARC/SCC/CRC/FLC, with exact course codes, units, and links to each source page. When the student asks about a specific major's requirements, point them to the Education tab for the exact course list and remind them it is a snapshot to verify with a counselor.`;
  }
  return ctx;
}

async function sendAdvisorMessage(text){
  let content;
  const att = state.pendingAttachment;
  if(att){
    content = [
      { type: att.kind, source: { type:"base64", media_type: att.mediaType, data: att.base64 } },
      { type:"text", text: text || (state.lang==="ru" ? "Проанализируй, пожалуйста, этот документ." : "Please analyze this document.") }
    ];
  } else {
    content = text;
  }
  state.advisorMessages.push({role:"user", content, attachmentName: att ? att.name : null});
  state.pendingAttachment = null;
  state.advisorLoading=true; persist(); render();
  try{
    const apiMessages = state.advisorMessages.map(m=>({role:m.role, content:m.content}));
    /* On claude.ai the artifact host proxies and authenticates this call.
       Anywhere else (e.g. GitHub Pages) the student supplies their own key,
       stored only in this browser; the CORS opt-in header below is what
       Anthropic requires for direct browser access. */
    const headers = {"Content-Type":"application/json"};
    if(state.apiKey){
      headers["x-api-key"] = state.apiKey;
      headers["anthropic-version"] = "2023-06-01";
      headers["anthropic-dangerous-direct-browser-access"] = "true";
    }
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers,
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1500, system: buildAdvisorSystemPrompt(), messages: apiMessages })
    });
    if(!response.ok){
      let et = "";
      try{ const err = await response.json(); et = (err.error&&err.error.type)||""; }catch(e){}
      const msg = (response.status===401||response.status===403) ? advT().errAuth
        : response.status===429 ? advT().errRate
        : (response.status===529||et==="overloaded_error") ? advT().errOverloaded
        : advT().errGeneric;
      state.advisorMessages.push({role:"assistant", content: msg});
    } else {
      const data = await response.json();
      const textBlocks = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text);
      const reply = textBlocks.join("\n") || "…";
      state.advisorMessages.push({role:"assistant", content:reply});
    }
  }catch(e){
    state.advisorMessages.push({role:"assistant", content: advT().errNet});
  }
  state.advisorLoading=false; persist(); render();
}

function handleAdvisorFile(file){
  const MAX_BYTES = 15*1024*1024; // 15MB safety cap
  if(file.size > MAX_BYTES){
    alert(t().attachTooLarge);
    return;
  }
  const isPdf = file.type === "application/pdf";
  const isImage = file.type.startsWith("image/");
  if(!isPdf && !isImage){
    alert(t().attachUnsupported);
    return;
  }
  const reader = new FileReader();
  reader.onload = ()=>{
    const base64 = reader.result.split(",")[1];
    state.pendingAttachment = { name:file.name, mediaType:file.type, base64, kind: isPdf ? "document" : "image" };
    render();
  };
  reader.readAsDataURL(file);
}

function renderAdvisor(){
  const el=document.createElement("div");
  el.innerHTML=`
    <div class="eyebrow">${t().advisorEyebrow}</div>
    <h2 class="title" style="font-size:27px;">${t().advisorTitle}</h2>
    <p class="lede">${state.results ? t().advisorLede : ""} ${t().advisorAttachHint}</p>
    <div class="advisor-wrap">
      <div class="advisor-messages" id="advisorMsgs"></div>
      <div id="attachmentPreview"></div>
      <div class="advisor-input-row">
        <input type="file" id="advisorFile" accept="image/*,.pdf" style="display:none;">
        <button id="advisorAttachBtn" class="attach-btn" type="button" title="${t().attachFile}">📎</button>
        <button id="advisorKeyBtn" class="attach-btn" type="button" title="${advT().keyTitle}">🔑</button>
        <textarea id="advisorInput" rows="2" placeholder="${t().advisorPlaceholder}"></textarea>
        <button id="advisorSend">${t().advisorSend}</button>
      </div>
    </div>
  `;
  const msgsBox=el.querySelector("#advisorMsgs");
  if(state.advisorMessages.length===0){
    msgsBox.innerHTML=`<div class="advisor-empty">${t().advisorEmpty}</div>`;
  } else {
    state.advisorMessages.forEach(m=>{
      const d=document.createElement("div");
      d.className="msg "+(m.role==="user"?"user":"bot");
      let textOut = "";
      if(Array.isArray(m.content)){
        const tb = m.content.find(b=>b.type==="text");
        textOut = tb ? tb.text : "";
      } else {
        textOut = m.content;
      }
      d.textContent = textOut;
      if(m.attachmentName){
        const chip=document.createElement("div");
        chip.className="attachment-chip-inline";
        chip.textContent = "📎 "+m.attachmentName;
        d.appendChild(chip);
      }
      msgsBox.appendChild(d);
    });
    if(state.advisorLoading){
      const d=document.createElement("div"); d.className="msg bot loading"; d.textContent="…"; msgsBox.appendChild(d);
    }
  }

  const previewBox = el.querySelector("#attachmentPreview");
  if(state.pendingAttachment){
    previewBox.innerHTML = `<div class="attachment-chip">📎 ${state.pendingAttachment.name} <button id="removeAttach" type="button">✕</button></div>`;
    previewBox.querySelector("#removeAttach").onclick=()=>{ state.pendingAttachment=null; render(); };
  }

  const fileInput = el.querySelector("#advisorFile");
  el.querySelector("#advisorAttachBtn").onclick=()=>fileInput.click();
  el.querySelector("#advisorKeyBtn").onclick=()=>{
    const cur = state.apiKey || "";
    const v = window.prompt(advT().keyPrompt, cur);
    if(v===null) return;
    state.apiKey = v.trim() || null;
    persist();
    showToast(state.apiKey ? advT().keySaved : advT().keyRemoved);
  };
  fileInput.onchange=(e)=>{ if(e.target.files[0]) handleAdvisorFile(e.target.files[0]); fileInput.value=""; };

  const input=el.querySelector("#advisorInput");
  const send=()=>{
    const val=input.value.trim();
    if((!val && !state.pendingAttachment) || state.advisorLoading) return;
    input.value="";
    sendAdvisorMessage(val);
  };
  el.querySelector("#advisorSend").onclick=send;
  input.addEventListener("keydown",(e)=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); } });
  return el;
}

loadPersisted();
